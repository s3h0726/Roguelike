<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>로그라이크 딥 테크트리 RPG - 수치 시각화 버전</title>
    <style>
        :root {
            --bg-color: #070709;
            --panel-color: #121214;
            --border-color: #222226;
            --text-color: #f4f4f5;
            --hp-color: #ef4444;
            --mp-color: #3b82f6;
            --exp-color: #10b981;
            --gold-color: #eab308;
        }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 4px; overflow: hidden; user-select: none; box-sizing: border-box;
        }

        .game-container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 460px; }
        
        .status-panel {
            width: 100%; background-color: var(--panel-color); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 6px 10px; margin-bottom: 4px; box-sizing: border-box;
        }
        .bar-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .bar-container {
            position: relative; width: 49%; height: 14px; background-color: #1f1f23; border-radius: 4px; overflow: hidden;
        }
        .bar-fill { height: 100%; width: 100%; }
        .bar-text { position: absolute; width: 100%; text-align: center; font-size: 9px; font-weight: bold; line-height: 14px; color: #fff; }
        
        .exp-container { position: relative; width: 100%; height: 6px; background-color: #1f1f23; border-radius: 2px; overflow: hidden; margin-bottom: 3px; }
        .info-row { display: flex; justify-content: space-between; font-size: 10px; color: #a1a1aa; }

        canvas { border: 1px solid var(--border-color); border-radius: 8px; background-color: #020204; width: 100%; max-height: 28vh; height: auto; }

        .control-panel {
            display: flex; width: 100%; justify-content: space-between; align-items: center; margin-top: 4px; gap: 6px;
        }
        .joystick-zone {
            width: 80px; height: 80px; background: #1f1f23; border: 2px solid #3f3f46; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center;
        }
        .joystick-stick { width: 32px; height: 32px; background: #52525b; border-radius: 50%; position: absolute; }

        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; width: 58%; }
        .action-btn {
            padding: 5px 2px; font-size: 10px; font-weight: bold; background-color: #1f1f23; border: 1px solid #3f3f46; color: #fff; border-radius: 6px; height: 38px;
        }
        .action-btn:disabled { opacity: 0.25; color: #52525b; }

        .sub-nav { display: flex; width: 100%; gap: 4px; margin-top: 4px; }
        .nav-btn { flex: 1; padding: 6px; font-size: 10px; font-weight: bold; background-color: #1f1f23; border: 1px solid var(--border-color); color: #fff; border-radius: 4px; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 100; align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: var(--panel-color); border: 1px solid var(--border-color);
            padding: 14px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; max-height: 85vh; overflow-y: auto;
        }
        .modal-title { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #eab308; }
        .choice-btn {
            width: 100%; padding: 8px; margin: 3px 0; background-color: #1f1f23;
            border: 1px solid #3f3f46; color: white; border-radius: 6px; font-size: 11px; text-align: left;
            display: flex; justify-content: space-between; align-items: center;
        }
        .skill-node { border-left: 3px solid #3f3f46; padding-left: 6px; margin: 4px 0; }
        .node-locked { opacity: 0.4; background-color: #0f0f11; }
        .equip-indicator { font-size: 9px; padding: 2px 4px; border-radius: 3px; background: #10b981; color: white; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="status-panel">
            <div class="bar-row">
                <div class="bar-container">
                    <div id="hpFill" class="bar-fill" style="background-color: var(--hp-color);"></div>
                    <div class="bar-text">HP <span id="pHp">50</span>/<span id="pMaxHp">50</span></div>
                </div>
                <div class="bar-container">
                    <div id="mpFill" class="bar-fill" style="background-color: var(--mp-color);"></div>
                    <div class="bar-text">MP <span id="pMp">30</span>/<span id="pMaxMp">30</span></div>
                </div>
            </div>
            <div class="exp-container">
                <div id="expFill" class="bar-fill" style="background-color: var(--exp-color); width: 0%;"></div>
            </div>
            <div class="info-row">
                <div>🌟 Lv.<span id="pLv">1</span> (<span id="pSp">0</span> SP) | 💰 <span id="pGold">0</span> G</div>
                <div>⚠️ 상태: <span id="pWaveState" style="color:#fff;">안정</span></div>
            </div>
        </div>

        <canvas id="gameCanvas" width="600" height="380"></canvas>
        
        <div class="sub-nav">
            <button class="nav-btn" onclick="openTreeModal()">🌲 계층형 스킬 트리 및 장착</button>
            <button class="nav-btn" onclick="openShopModal()">🛒 코인 상점</button>
        </div>

        <div class="control-panel">
            <div id="joystickZone" class="joystick-zone">
                <div id="joystickStick" class="joystick-stick"></div>
            </div>
            
            <div class="action-grid">
                <button id="slotBtn0" class="action-btn" onclick="useSlotSkill(0)">[비어있음]</button>
                <button id="slotBtn1" class="action-btn" onclick="useSlotSkill(1)">[비어있음]</button>
                <button id="slotBtn2" class="action-btn" onclick="useSlotSkill(2)">[비어있음]</button>
                <button id="slotBtn3" class="action-btn" onclick="useSlotSkill(3)">[비어있음]</button>
            </div>
        </div>
    </div>

    <div id="levelModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">🌟 LEVEL UP! 특성 선택</div>
            <div id="levelChoices"></div>
        </div>
    </div>

    <div id="treeModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">🌲 선행 잠금 해제식 계층 스킬 트리</div>
            <p style="font-size:10px; color:#a1a1aa; margin:0 0 6px 0;">상위 등급 스킬은 직전 선행 스킬이 최소 1레벨 이상이어야 연구 가능합니다.</p>
            <div id="treeSkillContainer"></div>
            <button class="choice-btn" style="text-align:center; background:#3f3f46; justify-content:center; margin-top:8px;" onclick="closeModals()">❌ 전장으로 복귀</button>
        </div>
    </div>

    <div id="shopModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">🛒 코인 재화 스탯 상점</div>
            <button class="choice-btn" onclick="buyShop(1)"><span>⚔️ 영구 공격력 고정 증가 +3</span> <span>15G</span></button>
            <button class="choice-btn" onclick="buyShop(2)"><span>❤️ 영구 최대 체력 고정 증가 +15</span> <span>20G</span></button>
            <button class="choice-btn" style="text-align:center; background:#3f3f46; justify-content:center;" onclick="closeModals()">❌ 닫기</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let player = { 
            worldX: 300, worldY: 200, radius: 13,
            hp: 50, maxHp: 50, mp: 30, maxMp: 30, baseAtk: 8,
            speed: 1.8, level: 1, exp: 0, maxExp: 12, sp: 0, gold: 0,
            isTrance: false, speedZeusTimer: 0, berserkTimer: 0, blizzardTimer: 0,
            
            rushTargetX: null, rushTargetY: null, rushSpeed: 12,

            lastDamagedTick: 0, 
            stats: { atkBonus: 0, hpBonus: 0, mpRegen: 0.02, magnetRange: 60 },
            
            shuriken: { count: 0, radius: 6, orbitRadius: 45, speed: 0.04, angle: 0, dmg: 4 },
            shield: { active: false, radius: 45, dmg: 2, tickTimer: 0 },
            magicArrowTimer: 0, arrowLevel: 0, 
            overloadLevel: 0, 

            skills: [
                { id: 10, name: "🌱 [기초] 집중 호흡", lv: 0, maxLv: 5, mp: 8, desc: "기본 공격 대미지 10% 보정 및 선행 확보", type: "passive", parentId: null, motion: "dash" },
                { id: 11, name: "🌿 [숙련] 잔상 베기", lv: 0, maxLv: 5, mp: 10, desc: "돌진 반경 내 적 치명타율 보정", type: "passive", parentId: 10, motion: "dash" },
                { id: 12, name: "🌳 [비기] 쾌속 난무", lv: 0, maxLv: 5, mp: 12, desc: "돌진 속도 및 난무 범위 가산", type: "passive", parentId: 11, motion: "dash" },
                { id: 0,  name: "🔥 [최상급] 무아지경", lv: 0, maxLv: 5, mp: 15, desc: "돌진 거리 비례 추가 피해 및 피감 50%~90%", type: "trance", parentId: 12, motion: "dash" },

                { id: 20, name: "🌱 [기초] 정전기 축전", lv: 0, maxLv: 5, mp: 6, desc: "이동속도 5% 가산 패시브", type: "passive", parentId: null },
                { id: 21, name: "🌿 [숙련] 도전 기동", lv: 0, maxLv: 5, mp: 9, desc: "낙뢰 발생 간격 10% 단축 보정", type: "passive", parentId: 20 },
                { id: 22, name: "🌳 [비기] 전뇌 합일", lv: 0, maxLv: 5, mp: 11, desc: "낙뢰 타격 계수 추가 강화", type: "passive", parentId: 21 },
                { id: 1,  name: "⚡ [최상급] 신속신벌", lv: 0, maxLv: 5, mp: 12, desc: "속도 대폭 증가 및 이동 궤적 낙뢰 발사", type: "zeus", parentId: 22 },

                { id: 30, name: "🌱 [기초] 투지 각성", lv: 0, maxLv: 5, mp: 7, desc: "공격 시 흡혈량 2% 기본 부여", type: "passive", parentId: null },
                { id: 31, name: "🌿 [숙련] 피의 서약", lv: 0, maxLv: 5, mp: 10, desc: "폭화 지속시간 1초 연장 패시브", type: "passive", parentId: 30 },
                { id: 32, name: "🌳 [비기] 불멸 격노", lv: 0, maxLv: 5, mp: 12, desc: "광폭화 중 공격력 20% 추가 증폭", type: "passive", parentId: 31 },
                { id: 2,  name: "🩸 [최상급] 성광폭화", lv: 0, maxLv: 5, mp: 14, desc: "공격력 폭증 및 모든 타격 흡혈 전환", type: "berserk", parentId: 32 },

                { id: 40, name: "🌱 [기초] 냉기 응축", lv: 0, maxLv: 5, mp: 8, desc: "동결된 적 방어력 10% 감소 효과", type: "passive", parentId: null },
                { id: 41, name: "🌿 [숙련] 서리 파편", lv: 0, maxLv: 5, mp: 11, desc: "동결 소멸 시 추가 파편 피해 적용", type: "passive", parentId: 40 },
                { id: 42, name: "🌳 [비기] 영도 제어", lv: 0, maxLv: 5, mp: 13, desc: "절대영도 동결 범위 20% 광역화", type: "passive", parentId: 41 },
                { id: 3,  name: "❄️ [최상급] 절대영도", lv: 0, maxLv: 5, mp: 16, desc: "화면 내 모든 적 일시 동결 및 피해", type: "blizzard", parentId: 42 }
            ],
            equippedSkillIds: [] 
        };

        let camera = { x: 0, y: 0 }; let monsters = []; let droppedGolds = []; let damageNumbers = []; let projectiles = []; let particles = [];   
        let keys = {}; let joystickInput = { x: 0, y: 0 }; let joystickActive = false; let gameTick = 0; let rushWaveTimer = 0; 

        const zone = document.getElementById("joystickZone"); const stick = document.getElementById("joystickStick");

        function handleJoystick(ex, ey) {
            const rect = zone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
            let dx = ex - centerX; let dy = ey - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy); const maxDist = 30;
            if (dist > maxDist) { dx = (dx / dist) * maxDist; dy = (dy / dist) * maxDist; }
            stick.style.transform = `translate(${dx}px, ${dy}px)`;
            joystickInput.x = dx / maxDist; joystickInput.y = dy / maxDist;
        }

        zone.addEventListener("touchstart", (e) => { joystickActive = true; handleJoystick(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener("touchmove", (e) => { if(joystickActive) handleJoystick(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
        window.addEventListener("touchend", () => { joystickActive = false; stick.style.transform = "translate(0px, 0px)"; joystickInput = {x:0, y:0}; });
        zone.addEventListener("mousedown", (e) => { joystickActive = true; handleJoystick(e.clientX, e.clientY); });
        window.addEventListener("mousemove", (e) => { if(joystickActive) handleJoystick(e.clientX, e.clientY); });
        window.addEventListener("mouseup", () => { joystickActive = false; stick.style.transform = "translate(0px, 0px)"; joystickInput = {x:0, y:0}; });

        function closeModals() {
            document.getElementById("levelModal").style.display = "none";
            document.getElementById("treeModal").style.display = "none";
            document.getElementById("shopModal").style.display = "none";
        }
        function openShopModal() { closeModals(); document.getElementById("shopModal").style.display = "flex"; }
        function openTreeModal() { closeModals(); renderTreeSkills(); document.getElementById("treeModal").style.display = "flex"; }

        function isSkillUnlocked(sk) {
            if (sk.parentId === null) return true;
            let parent = player.skills.find(s => s.id === sk.parentId);
            return parent && parent.lv > 0;
        }

        function renderTreeSkills() {
            const container = document.getElementById("treeSkillContainer");
            container.innerHTML = "";
            player.skills.forEach(sk => {
                let unlocked = isSkillUnlocked(sk);
                let isEquipped = player.equippedSkillIds.includes(sk.id);
                let div = document.createElement("div");
                div.className = `choice-btn skill-node ${unlocked ? "" : "node-locked"}`;
                div.style.flexDirection = "column";
                div.style.alignItems = "flex-start";
                
                let btnActionStr = sk.type === "passive" ? "기능 패시브 강화" : "스킬 연구 레벨업";

                div.innerHTML = `
                    <div style="display:flex; width:100%; justify-content:space-between; font-weight:bold;">
                        <span>${sk.name} (Lv.${sk.lv}/${sk.maxLv})</span>
                        <span style="color:#f59e0b;">${sk.type === 'passive' ? '패시브' : 'MP ' + sk.mp}</span>
                    </div>
                    <div style="font-size:10px; color:#a1a1aa; margin:2px 0;">${sk.desc}</div>
                    <div style="display:flex; gap:6px; margin-top:4px; width:100%;">
                        <button onclick="upgradeSkill(${sk.id}, event)" ${unlocked ? "" : "disabled"} style="font-size:9px; background:${unlocked ? '#3b82f6' : '#555'}; border:none; color:white; padding:3px 6px; border-radius:3px;">${btnActionStr} (1 SP)</button>
                        ${sk.type !== "passive" ? `
                        <button onclick="toggleEquipSkill(${sk.id}, event)" ${unlocked && sk.lv > 0 ? "" : "disabled"} style="font-size:9px; background:#27272a; border:1px solid #555; color:white; padding:3px 6px; border-radius:3px;">
                            ${isEquipped ? "❌ 장착 해제" : "➕ 슬롯 장착"}
                        </button>` : ''}
                        ${isEquipped ? '<span class="equip-indicator">장착됨</span>' : ''}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function upgradeSkill(id, e) {
            e.stopPropagation();
            let sk = player.skills.find(s => s.id === id);
            if (!isSkillUnlocked(sk)) return;
            if (player.sp >= 1 && sk.lv < sk.maxLv) { player.sp--; sk.lv++; renderTreeSkills(); updateUI(); }
        }

        function toggleEquipSkill(id, e) {
            e.stopPropagation();
            let sk = player.skills.find(s => s.id === id);
            if (sk.lv === 0 || !isSkillUnlocked(sk)) return;

            let idx = player.equippedSkillIds.indexOf(id);
            if (idx > -1) { player.equippedSkillIds.splice(idx, 1); } 
            else {
                if (player.equippedSkillIds.length >= 4) { alert("최대 4개 슬롯 제한!"); return; }
                player.equippedSkillIds.push(id);
            }
            renderTreeSkills(); updateUI();
        }

        function updateUI() {
            let totalMaxHp = player.maxHp + player.stats.hpBonus;
            document.getElementById("pHp").innerText = Math.ceil(player.hp);
            document.getElementById("pMaxHp").innerText = totalMaxHp;
            document.getElementById("pMp").innerText = Math.floor(player.mp);
            document.getElementById("pMaxMp").innerText = player.maxMp;
            document.getElementById("pLv").innerText = player.level;
            document.getElementById("pSp").innerText = player.sp;
            document.getElementById("pGold").innerText = player.gold;

            document.getElementById("hpFill").style.width = `${Math.max(0, (player.hp / totalMaxHp) * 100)}%`;
            document.getElementById("mpFill").style.width = `${(player.mp / player.maxMp) * 100}%`;
            document.getElementById("expFill").style.width = `${(player.exp / player.maxExp) * 100}%`;

            const waveEl = document.getElementById("pWaveState");
            if (rushWaveTimer > 0) { waveEl.innerText = `🚨 폭주(XP 2배!)`; waveEl.style.color = "#ef4444"; }
            else { waveEl.innerText = "안정"; waveEl.style.color = "#10b981"; }

            for (let i = 0; i < 4; i++) {
                const btn = document.getElementById(`slotBtn${i}`);
                if (i < player.equippedSkillIds.length) {
                    let sk = player.skills.find(s => s.id === player.equippedSkillIds[i]);
                    btn.innerHTML = `${sk.name.split("] ")[1]}<br><span style="font-size:8px; color:#93c5fd;">MP ${sk.mp} (Lv.${sk.lv})</span>`;
                    btn.disabled = (player.mp < sk.mp || player.isTrance);
                } else {
                    btn.innerHTML = "[비어있음]"; btn.disabled = true;
                }
            }
        }

        function buyShop(type) {
            if (type === 1 && player.gold >= 15) { player.gold -= 15; player.stats.atkBonus += 3; }
            else if (type === 2 && player.gold >= 20) { player.gold -= 20; player.stats.hpBonus += 15; player.hp += 15; }
            updateUI();
        }

        function checkLevelUp() {
            if (player.exp >= player.maxExp) {
                player.exp -= player.maxExp; player.level++; player.sp += 3;
                player.maxExp = Math.floor(player.maxExp * 1.3) + 6;
                triggerLevelChoice();
            }
        }

        function triggerLevelChoice() {
            const container = document.getElementById("levelChoices"); container.innerHTML = "";
            const pool = [
                { text: "🏹 유도 마법 화살 발사 강화", action: () => { player.arrowLevel++; }},
                { text: "💥 불안정한 과부하 연쇄 폭발 강화", action: () => { player.overloadLevel++; }},
                { text: "🌀 가디언 표창 확장 궤도 가산", action: () => { player.shuriken.count++; player.shuriken.radius += 1; player.shuriken.orbitRadius += 8; player.shuriken.dmg += 2; }},
                { text: "🛡️ 전자기 방어막 범위 확장", action: () => { player.shield.active = true; player.shield.radius += 14; player.shield.dmg += 1; }},
                { text: "🔮 마력 싱크 재생률 보정", action: () => { player.stats.mpRegen += 0.015; }}
            ];
            let shuffled = pool.sort(() => 0.5 - Math.random()).slice(0, 3);
            shuffled.forEach(choice => {
                let btn = document.createElement("button"); btn.className = "choice-btn"; btn.innerText = choice.text;
                btn.onclick = () => { choice.action(); closeModals(); updateUI(); }; container.appendChild(btn);
            });
            document.getElementById("levelModal").style.display = "flex";
        }

        function useSlotSkill(slotIdx) {
            if (slotIdx >= player.equippedSkillIds.length) return;
            let id = player.equippedSkillIds[slotIdx]; let sk = player.skills.find(s => s.id === id);
            if (player.mp < sk.mp || player.isTrance) return;

            if (sk.type === "trance") {
                if (monsters.length === 0) return;
                player.mp -= sk.mp; player.isTrance = true;
                let duration = 5000 + (sk.lv * 400); let startTime = Date.now();
                
                let interval = setInterval(() => {
                    if (Date.now() - startTime >= duration || player.hp <= 0 || monsters.length === 0) {
                        clearInterval(interval); player.isTrance = false; 
                        player.rushTargetX = null; player.rushTargetY = null; updateUI(); return;
                    }
                    let target = monsters[Math.floor(Math.random() * monsters.length)];
                    
                    // 📏 돌진 시작 거리 비례 연산 추가
                    let dx = target.worldX - player.worldX;
                    let dy = target.worldY - player.worldY;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    
                    // 거리가 멀수록 보너스 배수 적용 (최소 1배 ~ 거리당 가산)
                    let distanceMultiplier = 1.0 + (distance / 200); 

                    player.rushTargetX = target.worldX; player.rushTargetY = target.worldY;

                    let baseDmg = Math.floor((player.baseAtk + player.stats.atkBonus) * (1.2 + sk.lv * 0.3));
                    let finalDmg = Math.floor(baseDmg * distanceMultiplier);

                    triggerDamage(target, finalDmg, distanceMultiplier > 1.5 ? "#f43f5e" : "#f59e0b");
                }, 250);
            } 
            else if (sk.type === "zeus") { player.mp -= sk.mp; player.speedZeusTimer = 300 + (sk.lv * 60); } 
            else if (sk.type === "berserk") { player.mp -= sk.mp; player.berserkTimer = 360 + (sk.lv * 60); } 
            else if (sk.type === "blizzard") {
                player.mp -= sk.mp; player.blizzardTimer = 180 + (sk.lv * 40); 
                monsters.forEach(m => {
                    let dmg = 10 + (sk.lv * 5); m.hp -= dmg; m.frozen = true; m.frozenTimer = player.blizzardTimer;
                    damageNumbers.push({ worldX: m.worldX, worldY: m.worldY - 10, text: `❄️ ${dmg}`, color: "#60a5fa", time: 30 });
                });
            }
            updateUI();
        }

        function triggerDamage(target, dmg, color) {
            target.hp -= dmg; damageNumbers.push({ worldX: target.worldX, worldY: target.worldY - 14, text: `${dmg}`, color: color, time: 22 });
            if (target.hp <= 0) {
                droppedGolds.push({ worldX: target.worldX, worldY: target.worldY, value: Math.floor(Math.random() * 3) + 2 });
                let xpGain = target.isBoss ? 20 : 3; if (rushWaveTimer > 0) xpGain *= 2; 
                player.exp += xpGain; if (player.overloadLevel > 0) triggerExplosion(target.worldX, target.worldY);
                checkLevelUp();
            }
        }

        function triggerExplosion(wx, wy) {
            let expRadius = 50 + (player.overloadLevel * 10); let expDmg = 6 + (player.overloadLevel * 4);
            for(let i=0; i<8; i++) particles.push({ worldX: wx, worldY: wy, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4, time: 20 });
            monsters.forEach(m => {
                if (Math.sqrt((m.worldX - wx)**2 + (m.worldY - wy)**2) < expRadius) {
                    m.hp -= expDmg; damageNumbers.push({ worldX: m.worldX, worldY: m.worldY - 12, text: `💥 ${expDmg}`, color: "#f97316", time: 20 });
                }
            });
        }

        function updateGame() {
            gameTick++;
            if (player.hp <= 0 || document.getElementById("levelModal").style.display === "flex") return;

            if (gameTick % 2700 === 0) { rushWaveTimer = 600; } if (rushWaveTimer > 0) rushWaveTimer--;

            if (gameTick - player.lastDamagedTick >= 240 && gameTick % 45 === 0) {
                let maxHp = player.maxHp + player.stats.hpBonus;
                if (player.hp < maxHp) { player.hp = Math.min(maxHp, player.hp + 2); damageNumbers.push({ worldX: player.worldX, worldY: player.worldY - 15, text: "+2 Regen", color: "#34d399", time: 20 }); }
            }

            let levelScale = 1.0 + (player.level - 1) * 0.15;
            let currentSpeed = player.speed;

            if (player.isTrance && player.rushTargetX !== null) {
                let rdx = player.rushTargetX - player.worldX;
                let rdy = player.rushTargetY - player.worldY;
                let rdist = Math.sqrt(rdx*rdx + rdy*rdy);
                if (rdist > 6) {
                    player.worldX += (rdx / rdist) * player.rushSpeed;
                    player.worldY += (rdy / rdist) * player.rushSpeed;
                }
            }

            if (player.speedZeusTimer > 0) {
                currentSpeed *= 1.7; player.speedZeusTimer--;
                if (player.speedZeusTimer % 24 === 0) {
                    let zeusSk = player.skills.find(s => s.type === "zeus");
                    monsters.forEach(m => { if (Math.sqrt((m.worldX - player.worldX)**2 + (m.worldY - player.worldY)**2) < 110) triggerDamage(m, 3 + zeusSk.lv, "#60a5fa"); });
                }
            }
            if (player.berserkTimer > 0) player.berserkTimer--;
            if (player.blizzardTimer > 0) player.blizzardTimer--;

            let moveX = joystickInput.x; let moveY = joystickInput.y;
            if (keys["w"] || keys["arrowup"]) moveY = -1; if (keys["s"] || keys["arrowdown"]) moveY = 1;
            if (keys["a"] || keys["arrowleft"]) moveX = -1; if (keys["d"] || keys["arrowright"]) moveX = 1;

            if (!player.isTrance && (moveX !== 0 || moveY !== 0)) {
                let length = Math.sqrt(moveX*moveX + moveY*moveY);
                player.worldX += (moveX / length) * currentSpeed; player.worldY += (moveY / length) * currentSpeed;
            }
            if (player.mp < player.maxMp) player.mp += player.stats.mpRegen;

            camera.x += (player.worldX - canvas.width / 2 - camera.x) * 0.1;
            camera.y += (player.worldY - canvas.height / 2 - camera.y) * 0.1;

            if (player.arrowLevel > 0) {
                player.magicArrowTimer++;
                if (player.magicArrowTimer >= Math.max(20, 60 - (player.arrowLevel * 5)) && monsters.length > 0) {
                    player.magicArrowTimer = 0; projectiles.push({ worldX: player.worldX, worldY: player.worldY, speed: 4.5, dmg: 5 + (player.arrowLevel * 3), target: monsters[0] });
                }
            }

            for(let i=projectiles.length-1; i>=0; i--) {
                let p = projectiles[i]; if (!monsters.includes(p.target) || p.target.hp <= 0) { projectiles.splice(i, 1); continue; }
                let dx = p.target.worldX - p.worldX; let dy = p.target.worldY - p.worldY; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 8) { triggerDamage(p.target, p.dmg, "#c084fc"); projectiles.splice(i, 1); } else { p.worldX += (dx / dist) * p.speed; p.worldY += (dy / dist) * p.speed; }
            }

            particles.forEach(p => { p.worldX += p.vx; p.worldY += p.vy; p.time--; }); particles = particles.filter(p => p.time > 0);

            if (player.shuriken.count > 0) {
                player.shuriken.angle += player.shuriken.speed;
                for (let i = 0; i < player.shuriken.count; i++) {
                    let finalAngle = player.shuriken.angle + (i * (Math.PI * 2 / player.shuriken.count));
                    let sx = player.worldX + Math.cos(finalAngle) * player.shuriken.orbitRadius; let sy = player.worldY + Math.sin(finalAngle) * player.shuriken.orbitRadius;
                    monsters.forEach(m => { if (Math.sqrt((m.worldX - sx)**2 + (m.worldY - sy)**2) < m.radius + player.shuriken.radius) { m.hp -= 0.15; if (Math.random() < 0.05) triggerDamage(m, player.shuriken.dmg, "#a1a1aa"); } });
                }
            }

            if (player.shield.active && player.shield.tickTimer++ % 20 === 0) {
                monsters.forEach(m => { if (Math.sqrt((m.worldX - player.worldX)**2 + (m.worldY - player.worldY)**2) < player.shield.radius) triggerDamage(m, player.shield.dmg, "#3b82f6"); });
            }

            for(let i=droppedGolds.length-1; i>=0; i--) {
                let g = droppedGolds[i]; let dx = player.worldX - g.worldX; let dy = player.worldY - g.worldY; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < player.stats.magnetRange) { g.worldX += (dx / dist) * 4; g.worldY += (dy / dist) * 4; if (dist < player.radius + 6) { player.gold += g.value; droppedGolds.splice(i, 1); } }
            }

            let maxSpawnCount = rushWaveTimer > 0 ? 14 : 6;
            if (monsters.length < maxSpawnCount && gameTick % 30 === 0) {
                let isBossSpawn = (gameTick % 1200 === 0); let angle = Math.random() * Math.PI * 2;
                if (isBossSpawn) {
                    monsters.push({ worldX: player.worldX + Math.cos(angle) * 320, worldY: player.worldY + Math.sin(angle) * 320, name: "👑 보스", color: "#f43f5e", hp: 160 * levelScale, maxHp: 160 * levelScale, atk: 10 * levelScale, radius: 24, speed: 0.35, attackCooldown: 0, isBoss: true });
                } else {
                    let seed = Math.random(); let mType = { name: "슬라임", color: "#22c55e", hp: 14, atk: 1, radius: 10, speed: 0.5 };
                    if(seed > 0.7) mType = { name: "오크", color: "#f97316", hp: 35, atk: 3, radius: 14, speed: 0.4 };
                    monsters.push({ worldX: player.worldX + Math.cos(angle) * 340, worldY: player.worldY + Math.sin(angle) * 340, name: mType.name, color: mType.color, hp: mType.hp * levelScale, maxHp: mType.hp * levelScale, atk: mType.atk * levelScale, radius: mType.radius, speed: mType.speed + (rushWaveTimer > 0 ? 0.4 : 0), attackCooldown: 0, isBoss: false });
                }
            }

            monsters.forEach(m => {
                if (m.frozen) { m.frozenTimer--; if(m.frozenTimer <= 0) m.frozen = false; return; }
                let dx = player.worldX - m.worldX; let dy = player.worldY - m.worldY; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 5 && !player.isTrance) { m.worldX += (dx / dist) * m.speed; m.worldY += (dy / dist) * m.speed; }

                if (dist < player.radius + m.radius && m.attackCooldown <= 0) {
                    player.lastDamagedTick = gameTick;

                    let finalDamage = m.atk;
                    if (player.isTrance) {
                        let tranceSk = player.skills.find(s => s.type === "trance");
                        let reductionRate = 0.50 + (tranceSk.lv * 0.08); 
                        if (reductionRate > 0.90) reductionRate = 0.90; 
                        finalDamage = finalDamage * (1 - reductionRate);
                    }

                    player.hp = Math.max(0, player.hp - finalDamage);
                    let finalAtk = player.baseAtk + player.stats.atkBonus;
                    if (player.berserkTimer > 0) finalAtk *= 2.5;

                    triggerDamage(m, finalAtk, "#ffffff"); m.attackCooldown = 45;
                    damageNumbers.push({ worldX: player.worldX, worldY: player.worldY - 12, text: `-${Math.ceil(finalDamage)}`, color: "#ef4444", time: 20 });
                    if (player.berserkTimer > 0) player.hp = Math.min(player.maxHp + player.stats.hpBonus, player.hp + finalAtk * 0.3);
                }
                if (m.attackCooldown > 0) m.attackCooldown--;
            });

            monsters = monsters.filter(m => m.hp > 0); updateUI();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save(); ctx.translate(-camera.x, -camera.y);

            ctx.strokeStyle = rushWaveTimer > 0 ? "#2d1616" : "#131316"; ctx.lineWidth = 1;
            let startGridX = Math.floor(camera.x / 40) * 40 - 40; let startGridY = Math.floor(camera.y / 40) * 40 - 40;
            for (let x = startGridX; x < startGridX + canvas.width + 80; x += 40) { ctx.beginPath(); ctx.moveTo(x, startGridY); ctx.lineTo(x, startGridY + canvas.height + 80); ctx.stroke(); }
            for (let y = startGridY; y < startGridY + canvas.height + 80; y += 40) { ctx.beginPath(); ctx.moveTo(startGridX, y); ctx.lineTo(startGridX + canvas.width + 80, y); ctx.stroke(); }

            droppedGolds.forEach(g => { ctx.fillStyle = "#eab308"; ctx.beginPath(); ctx.arc(g.worldX, g.worldY, 4, 0, Math.PI * 2); ctx.fill(); });

            // 📊 몬스터 HP 수치 바 정밀 렌더링 파트
            monsters.forEach(m => {
                ctx.fillStyle = m.frozen ? "#60a5fa" : m.color; ctx.beginPath(); ctx.arc(m.worldX, m.worldY, m.radius, 0, Math.PI * 2); ctx.fill();
                
                // 배경 바
                ctx.fillStyle = "#1f1f23"; ctx.fillRect(m.worldX - 22, m.worldY - m.radius - 8, 44, 5);
                // 잔량 바
                ctx.fillStyle = "#ef4444"; ctx.fillRect(m.worldX - 22, m.worldY - m.radius - 8, 44 * (m.hp / m.maxHp), 5);
                
                // 0/0 형태의 수치 강제 주입
                ctx.fillStyle = "#ffffff";
                ctx.font = "bold 7px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(`${Math.ceil(m.hp)}/${Math.ceil(m.maxHp)}`, m.worldX, m.worldY - m.radius - 11);
            });

            projectiles.forEach(p => { ctx.fillStyle = "#c084fc"; ctx.beginPath(); ctx.arc(p.worldX, p.worldY, 3, 0, Math.PI * 2); ctx.fill(); });
            particles.forEach(p => { ctx.fillStyle = "#f97316"; ctx.beginPath(); ctx.arc(p.worldX, p.worldY, 2, 0, Math.PI * 2); ctx.fill(); });

            if (player.shield.active) { ctx.strokeStyle = "rgba(59, 130, 246, 0.2)"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(player.worldX, player.worldY, player.shield.radius, 0, Math.PI * 2); ctx.stroke(); }

            ctx.fillStyle = player.isTrance ? "rgba(245, 158, 11, 0.8)" : "#10b981";
            ctx.beginPath(); ctx.arc(player.worldX, player.worldY, player.radius, 0, Math.PI * 2); ctx.fill();

            if (player.shuriken.count > 0) {
                for (let i = 0; i < player.shuriken.count; i++) {
                    let finalAngle = player.shuriken.angle + (i * (Math.PI * 2 / player.shuriken.count));
                    ctx.fillStyle = "#e4e4e7"; ctx.beginPath(); ctx.arc(player.worldX + Math.cos(finalAngle)*player.shuriken.orbitRadius, player.worldY + Math.sin(finalAngle)*player.shuriken.orbitRadius, player.shuriken.radius, 0, Math.PI * 2); ctx.fill();
                }
            }

            ctx.textAlign = "left"; // 데미지 텍스트 정렬 리셋
            for (let i = damageNumbers.length - 1; i >= 0; i--) {
                let d = damageNumbers[i]; ctx.fillStyle = d.color; ctx.font = "bold 11px sans-serif"; ctx.fillText(d.text, d.worldX - 5, d.worldY); d.worldY -= 0.6; d.time--; if (d.time <= 0) damageNumbers.splice(i, 1);
            }
            ctx.restore();
        }

        function gameLoop() { updateGame(); draw(); requestAnimationFrame(gameLoop); }
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        gameLoop();
    </script>
</body>
</html>
