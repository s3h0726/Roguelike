<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>오픈월드 로그라이크 RPG - 얼티메이트 액션</title>
    <style>
        :root {
            --bg-color: #0c0c0e;
            --panel-color: #16161a;
            --border-color: #27272a;
            --text-color: #f4f4f5;
            --hp-color: #ef4444;
            --mp-color: #3b82f6;
            --action-color: #f59e0b;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 10px;
            overflow: hidden;
            user-select: none;
            box-sizing: border-box;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 500px;
        }

        h1 {
            font-size: 1.1rem;
            margin: 5px 0;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #a1a1aa;
        }
        
        .status-panel {
            width: 100%;
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 8px 12px;
            margin-bottom: 6px;
            box-sizing: border-box;
        }

        .bar-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .bar-container {
            position: relative;
            width: 48%;
            height: 16px;
            background-color: #1f1f23;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #3f3f46;
        }
        .bar-fill { height: 100%; width: 100%; transition: width 0.1s; }
        .bar-text {
            position: absolute; width: 100%; text-align: center;
            font-size: 10px; font-weight: bold; line-height: 16px; color: #fff;
            text-shadow: 1px 1px 1px #000;
        }

        .info-row {
            display: flex; justify-content: space-between; font-size: 11px; color: #a1a1aa;
        }

        canvas {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            background-color: #09090b;
            width: 100%;
            max-height: 35vh; /* 화면 잘림 방지를 위해 캔버스 최대 높이 제한 */
            height: auto;
        }

        .log-box {
            width: 100%;
            height: 50px;
            background-color: #09090b;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 6px;
            overflow-y: auto;
            font-size: 11px;
            color: #d4d4d8;
            margin-top: 6px;
            box-sizing: border-box;
        }

        /* 스킬 버튼 단 */
        .skills-wrapper {
            display: flex;
            justify-content: space-between;
            width: 100%;
            margin-top: 6px;
            gap: 6px;
        }
        .skill-btn {
            flex: 1;
            padding: 6px 2px;
            font-size: 11px;
            font-weight: bold;
            background-color: #27272a;
            border: 1px solid #3f3f46;
            color: white;
            border-radius: 6px;
            cursor: pointer;
        }
        .skill-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        /* 하단 조작계 배치 최적화 */
        .controls-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 8px;
            padding-bottom: 10px; /* 네비게이션 바 등 하단 여백 확보 */
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 44px);
            grid-template-rows: repeat(3, 44px);
            gap: 4px;
        }
        .dpad button {
            background: #27272a;
            color: #fff;
            border: 1px solid #3f3f46;
            border-radius: 8px;
            font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
        }
        .dpad button:active { background: #18181b; }
        .dpad .empty { visibility: hidden; }
        
        .ultimate-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 45%;
        }
        .action-btn-main {
            width: 76px;
            height: 76px;
            background: linear-gradient(145deg, #d97706, #b45309);
            border: 1px solid #f59e0b;
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            gap: 2px; border-radius: 50%;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .action-btn-main:disabled { background: #27272a; border-color: #3f3f46; color: #71717a; box-shadow: none;}
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Annihilation Infinite World</h1>
        
        <div class="status-panel">
            <div class="bar-row">
                <div class="bar-container">
                    <div id="hpFill" class="bar-fill" style="background-color: var(--hp-color);"></div>
                    <div class="bar-text">HP <span id="pHp">50</span>/50</div>
                </div>
                <div class="bar-container">
                    <div id="mpFill" class="bar-fill" style="background-color: var(--mp-color);"></div>
                    <div class="bar-text">MP <span id="pMp">30</span>/30</div>
                </div>
            </div>
            <div class="info-row">
                <div>⚔️ ATK: <span id="pAtk">7</span> | 🛡️ 장막: <span id="pShield">0</span>턴</div>
                <div>🔮 상태: <span id="pState" style="color: #10b981; font-weight:bold;">정상</span></div>
            </div>
        </div>

        <canvas id="gameCanvas" width="600" height="400"></canvas>
        
        <div class="skills-wrapper">
            <button id="btnSkill1" class="skill-btn" onclick="useLightning()">⚡ 장막 (MP10)</button>
            <button id="btnSkill2" class="skill-btn" onclick="useVampire()">🩸 흡혈 (MP12)</button>
        </div>
        
        <div id="gameLog" class="log-box">게임이 시작되었습니다. 몬스터들이 당신의 위치를 추격합니다!</div>

        <div class="controls-wrapper">
            <div class="dpad">
                <div class="empty"></div>
                <button id="btnUp">▲</button>
                <div class="empty"></div>
                <button id="btnLeft">◀</button>
                <div class="empty"></div>
                <button id="btnRight">▶</button>
                <div class="empty"></div>
                <button id="btnDown">▼</button>
            </div>
            
            <div class="ultimate-wrapper">
                <button id="btnUltimate" class="action-btn-main" onclick="useTrance()">
                    <span>🔥</span>
                    <span>무아지경</span>
                    <span style="font-size: 8px; color: #fef08a;">MP 15</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        const TILE_SIZE = 40;
        const COLS = canvas.width / TILE_SIZE; 
        const ROWS = canvas.height / TILE_SIZE; 

        let player = { 
            x: 7, y: 5, 
            hp: 50, maxHp: 50, 
            mp: 30, maxMp: 30,
            baseAtk: 7,
            lightningTurn: 0, // 정전기 장막 지속 턴
            isTrance: false
        };

        // 다채로운 몬스터 도감 프로필
        const MONSTER_TYPES = [
            { name: "슬라임", color: "#22c55e", hp: 12, atk: 3, speed: 0.3 },
            { name: "고블린 추격꾼", color: "#a855f7", hp: 15, atk: 5, speed: 0.7 },
            { name: "오크 전사", color: "#f97316", hp: 25, atk: 7, speed: 0.4 }
        ];

        let chunks = {};
        let chunkMonsters = {};
        let cameraShake = { x: 0, y: 0, duration: 0 };
        let damageNumbers = [];

        function addLog(message) {
            const logBox = document.getElementById("gameLog");
            logBox.innerHTML += `<br>${message}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateUI() {
            document.getElementById("pHp").innerText = player.hp;
            document.getElementById("pMp").innerText = player.mp;
            document.getElementById("pAtk").innerText = player.baseAtk;
            document.getElementById("pShield").innerText = player.lightningTurn;
            
            document.getElementById("hpFill").style.width = `${(player.hp / player.maxHp) * 100}%`;
            document.getElementById("mpFill").style.width = `${(player.mp / player.maxMp) * 100}%`;

            const stateEl = document.getElementById("pState");
            if (player.isTrance) {
                stateEl.innerText = "무아지경 돌진!";
                stateEl.style.color = "#f59e0b";
            } else {
                stateEl.innerText = "정상";
                stateEl.style.color = "#10b981";
            }

            // 마나 상태별 스킬 활성화 바인딩
            document.getElementById("btnUltimate").disabled = (player.mp < 15 || player.isTrance);
            document.getElementById("btnSkill1").disabled = (player.mp < 10 || player.isTrance);
            document.getElementById("btnSkill2").disabled = (player.mp < 12 || player.isTrance);
        }

        function getOrCreateChunk(cx, cy) {
            const key = `${cx},${cy}`;
            if (chunks[key]) return chunks[key];

            let mapData = [];
            for (let r = 0; r < ROWS; r++) {
                let row = [];
                for (let c = 0; c < COLS; c++) {
                    if (cx === 0 && cy === 0 && c === 7 && r === 5) row.push(0);
                    else row.push(Math.random() < 0.06 ? 1 : 0); // 맵 시인성을 위해 벽 확률 조절
                }
                mapData.push(row);
            }
            chunks[key] = mapData;

            // 다양한 종류의 몬스터 확충 스폰
            let monsters = [];
            const count = Math.floor(Math.random() * 2) + 2;
            for (let i = 0; i < count; i++) {
                let mx = Math.floor(Math.random() * COLS);
                let my = Math.floor(Math.random() * ROWS);
                if (mapData[my][mx] === 0 && !(cx === 0 && cy === 0 && mx === 7 && my === 5)) {
                    let type = MONSTER_TYPES[Math.floor(Math.random() * MONSTER_TYPES.length)];
                    monsters.push({ 
                        x: mx, y: my, 
                        name: type.name, color: type.color,
                        hp: type.hp, maxHp: type.hp, atk: type.atk, speed: type.speed 
                    });
                }
            }
            chunkMonsters[key] = monsters;
            return mapData;
        }

        function getPlayerState() {
            let chunkX = Math.floor(player.x / COLS);
            let chunkY = Math.floor(player.y / ROWS);
            let localX = (player.x % COLS + COLS) % COLS;
            let localY = (player.y % ROWS + ROWS) % ROWS;
            return { chunkX, chunkY, localX, localY };
        }

        function renderLoop() {
            if (cameraShake.duration > 0) {
                cameraShake.x = (Math.random() - 0.5) * 8;
                cameraShake.y = (Math.random() - 0.5) * 8;
                cameraShake.duration--;
            } else { cameraShake.x = 0; cameraShake.y = 0; }

            ctx.save();
            ctx.translate(cameraShake.x, cameraShake.y);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const state = getPlayerState();
            const currentChunkKey = `${state.chunkX},${state.chunkY}`;
            const currentMap = getOrCreateChunk(state.chunkX, state.chunkY);
            const monsters = chunkMonsters[currentChunkKey] || [];

            // 1. 타일맵 그리기
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (currentMap[r][c] === 1) {
                        ctx.fillStyle = "#3f3f46";
                        ctx.fillRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    } else {
                        ctx.strokeStyle = "#18181b";
                        ctx.strokeRect(c * TILE_SIZE, r * TILE_SIZE, TILE_SIZE, TILE_SIZE);
                    }
                }
            }

            // 2. 고유 색상별 다채로운 몬스터 렌더링
            monsters.forEach(m => {
                ctx.fillStyle = m.color;
                ctx.beginPath();
                ctx.arc(m.x * TILE_SIZE + TILE_SIZE / 2, m.y * TILE_SIZE + TILE_SIZE / 2, TILE_SIZE / 3.2, 0, Math.PI * 2);
                ctx.fill();
                
                // 체력 바
                ctx.fillStyle = "#27272a";
                ctx.fillRect(m.x * TILE_SIZE + 6, m.y * TILE_SIZE + 2, TILE_SIZE - 12, 3);
                ctx.fillStyle = "#ef4444";
                ctx.fillRect(m.x * TILE_SIZE + 6, m.y * TILE_SIZE + 2, (TILE_SIZE - 12) * (m.hp / m.maxHp), 3);
            });

            // 3. 플레이어 시각효과 (장막 전개 시 전기 스파크 글로우 서클 부여)
            ctx.fillStyle = player.isTrance ? "#f59e0b" : "#10b981";
            if (player.lightningTurn > 0) {
                ctx.shadowColor = "#3b82f6";
                ctx.shadowBlur = 12;
            }
            ctx.beginPath();
            ctx.arc(state.localX * TILE_SIZE + TILE_SIZE / 2, state.localY * TILE_SIZE + TILE_SIZE / 2, TILE_SIZE / 2.8, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;

            // 4. 데미지 플로팅 피드백
            for (let i = damageNumbers.length - 1; i >= 0; i--) {
                let dmg = damageNumbers[i];
                ctx.fillStyle = dmg.color;
                ctx.font = "bold 14px sans-serif";
                ctx.fillText(dmg.text, dmg.x, dmg.y);
                dmg.y -= 1;
                dmg.duration--;
                if (dmg.duration <= 0) damageNumbers.splice(i, 1);
            }

            ctx.restore();
            requestAnimationFrame(renderLoop);
        }

        function triggerHit(x, y, text, color = "#ef4444") {
            cameraShake.duration = 6;
            damageNumbers.push({
                x: x * TILE_SIZE + 10, y: y * TILE_SIZE + 5,
                text: text, color: color, duration: 25
            });
        }

        // ⚙️ [월드 추격 핵심 로직]: 맵이 바뀌어도 원거리 몬스터들이 연동되어 따라오게 처리
        function migrateMonstersAcrossChunks(oldCx, oldCy, newCx, newCy, dx, dy) {
            const oldKey = `${oldCx},${oldCy}`;
            const newKey = `${newCx},${newCy}`;
            
            if (!chunkMonsters[oldKey] || chunkMonsters[oldKey].length === 0) return;
            
            getOrCreateChunk(newCx, newCy); // 목적지 청크 미리 개설 보장
            let destinationMap = chunks[newKey];

            // 이전 방에 있던 몬스터들을 추출해 새 타겟 방으로 경계 차원 이동 유도
            let stayingMonsters = [];
            chunkMonsters[oldKey].forEach(m => {
                // 월드 맵 이동 방향의 반대편 모서리 경계면으로 리스폰 위치 전이 연출
                let targetLocalX = m.x - (dx * COLS);
                let targetLocalY = m.y - (dy * ROWS);

                // 안전장치 범위 압축 가공
                targetLocalX = Math.max(0, Math.min(COLS - 1, targetLocalX));
                targetLocalY = Math.max(0, Math.min(ROWS - 1, targetLocalY));

                if (destinationMap[targetLocalY][targetLocalX] === 0) {
                    m.x = targetLocalX;
                    m.y = targetLocalY;
                    if (!chunkMonsters[newKey]) chunkMonsters[newKey] = [];
                    chunkMonsters[newKey].push(m);
                } else {
                    stayingMonsters.push(m); // 벽이 막고 있으면 구역 보존
                }
            });
            chunkMonsters[oldKey] = stayingMonsters;
        }

        // 전방위 적 탐지 추적 AI 알고리즘
        function moveMonstersAI(monsters, currentMap, localX, localY) {
            monsters.forEach(m => {
                if (Math.random() > m.speed) return; // 고유 기동 스피드 적용 확률 연산
                
                let diffX = Math.sign(localX - m.x);
                let diffY = Math.sign(localY - m.y);

                let nextX = m.x + (diffX !== 0 ? diffX : 0);
                let nextY = m.y + (diffX === 0 ? diffY : 0);

                if (currentMap[nextY] && currentMap[nextY][nextX] === 0 && !(nextX === localX && nextY === localY)) {
                    if (!monsters.some(o => o !== m && o.x === nextX && o.y === nextY)) {
                        m.x = nextX;
                        m.y = nextY;
                    }
                }
            });
        }

        // 특수 유틸리티 메커니즘 1: 정전기 장막 광역 감전 피드백 효과 연출
        function applyLightningTick(monsters) {
            if (player.lightningTurn <= 0 || monsters.length === 0) return;
            
            const state = getPlayerState();
            for(let i = monsters.length - 1; i >= 0; i--) {
                let m = monsters[i];
                // 주변 8칸 범위 내 연산 법칙
                if (Math.abs(m.x - state.localX) <= 1 && Math.abs(m.y - state.localY) <= 1) {
                    m.hp -= 3;
                    triggerHit(m.x, m.y, "⚡감전 -3", "#3b82f6");
                    if (m.hp <= 0) {
                        addLog(`⚡ 감전 효과로 인해 [${m.name}]이 무력화되었습니다.`);
                        monsters.splice(i, 1);
                    }
                }
            }
        }

        function movePlayer(dx, dy) {
            if (player.hp <= 0 || player.isTrance) return;

            let prevStates = getPlayerState();
            let nextGlobalX = player.x + dx;
            let nextGlobalY = player.y + dy;

            let nextStates = {
                chunkX: Math.floor(nextGlobalX / COLS),
                chunkY: Math.floor(nextGlobalY / ROWS),
                localX: (nextGlobalX % COLS + COLS) % COLS,
                localY: (nextGlobalY % ROWS + ROWS) % ROWS
            };

            // 청크 전이 확인 시 몬스터 마이그레이션 발동
            if (prevStates.chunkX !== nextStates.chunkX || prevStates.chunkY !== nextStates.chunkY) {
                migrateMonstersAcrossChunks(prevStates.chunkX, prevStates.chunkY, nextStates.chunkX, nextStates.chunkY, dx, dy);
                addLog("🔮 공간이 왜곡되며 주위 적들이 당신을 쫓아 차원을 넘어옵니다!");
            }

            const targetMap = getOrCreateChunk(nextStates.chunkX, nextStates.chunkY);
            if (targetMap[nextStates.localY][nextStates.localX] === 1) return;

            const targetChunkKey = `${nextStates.chunkX},${nextStates.chunkY}`;
            let monsters = chunkMonsters[targetChunkKey] || [];
            let mIdx = monsters.findIndex(m => m.x === nextStates.localX && m.y === nextStates.localY);

            if (mIdx !== -1) {
                let m = monsters[mIdx];
                m.hp -= player.baseAtk;
                triggerHit(m.x, m.y, `-${player.baseAtk}`);

                if (m.hp <= 0) {
                    addLog(`⚔️ [${m.name}] 처치 완료.`);
                    monsters.splice(mIdx, 1);
                } else {
                    player.hp = Math.max(0, player.hp - m.atk);
                    if(player.hp <= 0) addLog("💀 사망하셨습니다.");
                }
            } else {
                player.x = nextGlobalX;
                player.y = nextGlobalY;
                if (player.mp < player.maxMp && Math.random() < 0.35) player.mp = Math.min(player.maxMp, player.mp + 1);
            }

            // 지속형 장막 메커니즘 차감 및 작동 루프
            if (player.lightningTurn > 0) {
                applyLightningTick(monsters);
                player.lightningTurn--;
            }

            const currentStates = getPlayerState();
            moveMonstersAI(monsters, targetMap, currentStates.localX, currentStates.localY);
            updateUI();
        }

        // 🔥 [개편된 무아지경]: 제자리 난사가 아닌 몬스터의 앞타일로 실제 대시 돌진격파 수행
        function useTrance() {
            if (player.mp < 15 || player.isTrance || player.hp <= 0) return;

            const state = getPlayerState();
            const currentChunkKey = `${state.chunkX},${state.chunkY}`;
            let monsters = chunkMonsters[currentChunkKey] || [];
            const currentMap = chunks[currentChunkKey];

            if (monsters.length === 0) {
                addLog("🌀 시야 주위에 돌진할 타겟팅 상대가 존재하지 않습니다!");
                return;
            }

            player.mp -= 15;
            player.isTrance = true;
            updateUI();

            let target = monsters[0];
            addLog(`🔥 [무아지경] 발동! [${target.name}]의 좌표로 일섬 돌진합니다!`);

            setTimeout(() => {
                // 몬스터 근처 빈칸 위치 계산 후 실시간 물리 텔레포트 대시 무빙 처리
                let targetDashX = target.x === 0 ? 1 : target.x - 1;
                let targetDashY = target.y;

                if (currentMap[targetDashY] && currentMap[targetDashY][targetDashX] === 0) {
                    player.x = state.chunkX * COLS + targetDashX;
                    player.y = state.chunkY * ROWS + targetDashY;
                }

                // 강력한 치명타 가중 격파
                let totalDmg = Math.floor(player.baseAtk * 2.5);
                target.hp -= totalDmg;
                triggerHit(target.x, target.y, `💥💥 CRIT ${totalDmg}`, "#f59e0b");

                if (target.hp <= 0) {
                    addLog(`🎉 무아지경 돌진 참격으로 [${target.name}]을 즉사 분쇄시켰습니다!`);
                    monsters.shift();
                } else {
                    player.hp = Math.max(0, player.hp - Math.floor(target.atk / 2)); // 경감 반격
                }

                player.isTrance = false;
                updateUI();
            }, 300); // 0.3초의 강렬한 돌진 딜레이 연출
        }

        // ⚡ 특수 메커니즘 스킬 1: 정전기 장막 활성화
        function useLightning() {
            if (player.mp < 10 || player.isTrance || player.hp <= 0) return;
            player.mp -= 10;
            player.lightningTurn = 5; // 5보 폭 동안 주위 지속 방전 피해 활성화
            addLog("⚡ [정전기 장막] 전개! 5턴 동안 곁으로 다가오는 적들을 지속 감전시킵니다.");
            updateUI();
        }

        // 🩸 특수 메커니즘 스킬 2: 흡혈 참격 단타 발동
        function useVampire() {
            if (player.mp < 12 || player.isTrance || player.hp <= 0) return;

            const state = getPlayerState();
            const currentChunkKey = `${state.chunkX},${state.chunkY}`;
            let monsters = chunkMonsters[currentChunkKey] || [];

            if (monsters.length === 0) {
                addLog("🩸 주변에 피를 흡수할 타겟 생명체가 없습니다.");
                return;
            }

            player.mp -= 12;
            let target = monsters[0];
            let vDmg = Math.floor(player.baseAtk * 1.4);
            let vHeal = Math.floor(vDmg * 0.5); // 데미지의 50% 흡혈

            target.hp -= vDmg;
            player.hp = Math.min(player.maxHp, player.hp + vHeal);
            
            triggerHit(target.x, target.y, `🩸흡혈 참격 -${vDmg}`, "#ec4899");
            addLog(`🩸 흡혈 참격 적중! 적에게 ${vDmg} 피해를 주고 체력을 +${vHeal} 흡수했습니다.`);

            if (target.hp <= 0) {
                addLog(`🎉 [${target.name}]이 피를 빨려 소멸했습니다.`);
                monsters.shift();
            }
            updateUI();
        }

        // 이벤트 리스너 바인딩
        window.addEventListener("keydown", (e) => {
            switch(e.key.toLowerCase()) {
                case "arrowup": case "w": movePlayer(0, -1); break;
                case "arrowdown": case "s": movePlayer(0, 1); break;
                case "arrowleft": case "a": movePlayer(-1, 0); break;
                case "arrowright": case "d": movePlayer(1, 0); break;
            }
        });

        const addTouch = (id, dx, dy) => {
            const b = document.getElementById(id);
            b.addEventListener("touchstart", (e) => { e.preventDefault(); movePlayer(dx, dy); }, { passive: false });
            b.addEventListener("mousedown", (e) => { e.preventDefault(); movePlayer(dx, dy); });
        };
        addTouch("btnUp", 0, -1); addTouch("btnDown", 0, 1);
        addTouch("btnLeft", -1, 0); addTouch("btnRight", 1, 0);

        getOrCreateChunk(0, 0);
        updateUI();
        renderLoop();
    </script>
</body>
</html>
