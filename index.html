<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>핵앤슬래시 인피니트 카오스 에덴</title>
    <style>
        :root {
            --bg-color: #030305;
            --panel-color: #08080a;
            --border-color: #1c1c24;
            --text-color: #f4f4f5;
            --hp-color: #f43f5e;
            --mp-color: #3b82f6;
            --exp-color: #10b981;
        }

        body {
            background-color: var(--bg-color); color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center;
            margin: 0; padding: 4px; overflow: hidden; user-select: none; box-sizing: border-box;
        }

        .game-container { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 460px; }
        
        .status-panel {
            width: 100%; background-color: var(--panel-color); border: 1px solid var(--border-color);
            border-radius: 8px; padding: 6px 10px; margin-bottom: 4px; box-sizing: border-box;
        }
        .bar-row { display: flex; justify-content: space-between; margin-bottom: 3px; }
        .bar-container {
            position: relative; width: 49%; height: 20px; background-color: #0d0d12; border-radius: 4px; overflow: hidden;
            border: 1px solid #27272a;
        }
        .bar-fill { height: 100%; width: 100%; transition: width 0.05s ease; }
        .bar-text { position: absolute; top: 0; left: 0; width: 100%; text-align: center; font-size: 11px; font-weight: 900; line-height: 20px; color: #ffffff; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; z-index: 5; }
        
        .exp-container { position: relative; width: 100%; height: 6px; background-color: #0d0d12; border-radius: 2px; overflow: hidden; margin-bottom: 3px; }
        .info-row { display: flex; justify-content: space-between; font-size: 10px; color: #a1a1aa; align-items: center; }

        canvas { border: 1px solid var(--border-color); border-radius: 8px; background-color: #010103; width: 100%; max-height: 28vh; height: auto; }

        .control-panel {
            display: flex; width: 100%; justify-content: space-between; align-items: center; margin-top: 4px; gap: 6px;
        }
        .joystick-zone {
            width: 80px; height: 80px; background: #111115; border: 2px solid #27272a; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center;
        }
        .joystick-stick { width: 32px; height: 32px; background: #3e3e44; border-radius: 50%; position: absolute; }

        .action-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 4px; width: 58%; }
        .action-btn {
            padding: 2px; font-size: 9px; font-weight: bold; background-color: #111115; border: 1px solid #27272a; color: #fff; border-radius: 6px; height: 38px;
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .action-btn:disabled { opacity: 0.2; color: #3e3e44; }

        .sub-nav { display: flex; width: 100%; gap: 4px; margin-top: 4px; }
        .nav-btn { flex: 1; padding: 6px; font-size: 10px; font-weight: bold; background-color: #111115; border: 1px solid var(--border-color); color: #fff; border-radius: 4px; }

        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.94); z-index: 100; align-items: center; justify-content: center;
        }
        .modal-content {
            background-color: var(--panel-color); border: 1px solid var(--border-color);
            padding: 14px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; max-height: 85vh; overflow-y: auto;
        }
        .modal-title { font-size: 13px; font-weight: bold; margin-bottom: 8px; color: #fbbf24; }
        .choice-btn {
            width: 100%; padding: 9px; margin: 4px 0; background-color: #111115;
            border: 1px solid #27272a; color: white; border-radius: 6px; font-size: 11px; text-align: left;
            display: flex; justify-content: space-between; align-items: center;
        }
        .skill-node { border-left: 3px solid #3b82f6; padding-left: 6px; margin: 4px 0; }
        .node-locked { opacity: 0.3; background-color: #050507; border-left-color: #444; }
        .equip-indicator { font-size: 9px; padding: 2px 4px; border-radius: 3px; background: #10b981; color: white; }
    </style>
</head>
<body>

    <div class="game-container">
        <div class="status-panel">
            <div class="bar-row">
                <div class="bar-container">
                    <div id="hpFill" class="bar-fill" style="background-color: var(--hp-color);"></div>
                    <div class="bar-text" id="pUiHp">0/0</div>
                </div>
                <div class="bar-container">
                    <div id="mpFill" class="bar-fill" style="background-color: var(--mp-color);"></div>
                    <div class="bar-text" id="pUiMp">0/0</div>
                </div>
            </div>
            <div class="exp-container">
                <div id="expFill" class="bar-fill" style="background-color: var(--exp-color); width: 0%;"></div>
            </div>
            <div class="info-row">
                <div>🌟 Lv.<span id="pLv">1</span> (<span id="pSp">0</span> SP) | 💰 <span id="pGold">0</span> G</div>
                <div style="font-size: 9px; color: #60a5fa;" id="saveIndicator">💾 자동 저장 완료</div>
                <div>💀 상태: <span id="pWaveState" style="font-weight:900;">안정 정역</span></div>
            </div>
        </div>

        <canvas id="gameCanvas" width="600" height="380"></canvas>
        
        <div class="sub-nav">
            <button class="nav-btn" onclick="openTreeModal()">🌲 각성 스킬 연구/장착</button>
            <button class="nav-btn" onclick="openShopModal()">🛒 스탯 상점</button>
            <button class="nav-btn" style="background:#7f1d1d; max-width:65px;" onclick="resetData()">♻️ 초기화</button>
        </div>

        <div class="control-panel">
            <div id="joystickZone" class="joystick-zone">
                <div id="joystickStick" class="joystick-stick"></div>
            </div>
            
            <div class="action-grid">
                <button id="slotBtn0" class="action-btn" onclick="useSlotSkill(0)">[비어있음]</button>
                <button id="slotBtn1" class="action-btn" onclick="useSlotSkill(1)">[비어있음]</button>
                <button id="slotBtn2" class="action-btn" onclick="useSlotSkill(2)">[비어있음]</button>
                <button id="slotBtn3" class="action-btn" onclick="useSlotSkill(3)">[비어있음]</button>
            </div>
        </div>
    </div>

    <div id="levelModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">🌌 심연의 오벨리스크 축복 선택</div>
            <div id="levelChoices"></div>
        </div>
    </div>

    <div id="treeModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">🌲 시전형 스킬 커스터마이징 연구소</div>
            <div id="treeSkillContainer"></div>
            <button class="choice-btn" style="text-align:center; background:#27272a; justify-content:center; margin-top:8px;" onclick="closeModals()">❌ 전장 복귀</button>
        </div>
    </div>

    <div id="shopModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">🛒 시공 스탯 강화 상점</div>
            <button class="choice-btn" onclick="buyShop(1)"><span>⚔️ 영구 공격력 고정 가산 +3</span> <span>15G</span></button>
            <button class="choice-btn" onclick="buyShop(2)"><span>❤️ 영구 최대 체력 고정 가산 +15</span> <span>20G</span></button>
            <button class="choice-btn" style="text-align:center; background:#27272a; justify-content:center;" onclick="closeModals()">❌ 닫기</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let player = { 
            worldX: 300, worldY: 200, radius: 13,
            hp: 60, maxHp: 60, mp: 40, maxMp: 40, baseAtk: 10,
            speed: 1.9, level: 1, exp: 0, maxExp: 12, sp: 0, gold: 0,
            
            isTrance: false, tranceTimer: 0, speedZeusTimer: 0, berserkTimer: 0, blizzardTimer: 0,
            rushTargetX: null, rushTargetY: null, rushSpeed: 16,

            lastDamagedTick: 0, 
            stats: { atkBonus: 0, hpBonus: 0, mpRegen: 0.03, magnetRange: 65, critChance: 0.06, doubleCast: 0, expBoostLevel: 0 },
            
            shuriken: { count: 0, radius: 6, orbitRadius: 45, speed: 0.04, angle: 0, dmg: 4 },
            shield: { active: false, radius: 45, dmg: 2, tickTimer: 0 },
            magicArrowTimer: 0, arrowLevel: 0, 
            overloadLevel: 0, chainLightningLevel: 0, giantSizeLevel: 0, thornLevel: 0,

            skills: [
                { id: 10, name: "🌱 [시전] 집중 호흡", lv: 0, maxLv: 5, mp: 3, desc: "이동 방향으로 순간 가속 대시 돌진하며 충돌 물리 대미지 선사", type: "active_dash", parentId: null },
                { id: 11, name: "🌿 [시전] 잔상 베기", lv: 0, maxLv: 5, mp: 5, desc: "범위 내 무작위 적을 추적하여 초고속 2연 연속 참격 격발", type: "active_slash", parentId: 10 },
                { id: 12, name: "🌳 [시전] 쾌속 난무", lv: 0, maxLv: 5, mp: 8, desc: "자신의 주위 전방위에 무수한 폭풍 칼날 잔상 파티클 방출", type: "active_dance", parentId: 11 },
                { id: 0,  name: "🔥 [최상급] 무아지경", lv: 0, maxLv: 5, mp: 14, desc: "폭발적인 연속 거리 비례 초강력 돌격 난무 상태 진입", type: "trance", parentId: 12 },

                { id: 20, name: "🌱 [시전] 정전기 축전", lv: 0, maxLv: 5, mp: 3, desc: "근방 타겟의 머리 위에 푸른빛 단일 유도 낙뢰 강하", type: "active_zap", parentId: null },
                { id: 21, name: "🌿 [시전] 도전 기동", lv: 0, maxLv: 5, mp: 6, desc: "사방 십자 각도로 뻗어나가는 전기 전하 미사일 사출", type: "active_spark", parentId: 20 },
                { id: 22, name: "🌳 [시전] 전뇌 합일", lv: 0, maxLv: 5, mp: 9, desc: "화면 내 적 전체를 일시에 감전시키는 마그네틱 전자기장", type: "active_wave", parentId: 21 },
                { id: 1,  name: "⚡ [최상급] 천벌강림", lv: 0, maxLv: 5, mp: 12, desc: "발걸음마다 뇌격 폭풍 포격을 바닥에 쏟아붓는 버프 발동", type: "zeus", parentId: 22 },

                { id: 30, name: "🌱 [시전] 투지 각성", lv: 0, maxLv: 5, mp: 4, desc: "적을 관통하며 플레이어 생명력을 채우는 고속 혈탄 투사", type: "active_blood", parentId: null },
                { id: 31, name: "🌿 [시전] 피의 서약", lv: 0, maxLv: 5, mp: 7, desc: "자신의 체력을 4 깎아 광범위 불꽃 블러드 익스플로전 전개", type: "active_curse", parentId: 30 },
                { id: 32, name: "🌳 [시전] 불멸 격노", lv: 0, maxLv: 5, mp: 10, desc: "지면에서 어둠의 혈각 가시 융기를 발생시켜 대량 학살", type: "active_spike", parentId: 31 },
                { id: 2,  name: "🩸 [최상급] 칠흑멸계", lv: 0, maxLv: 5, mp: 14, desc: "진홍빛 영혼 흡수 파동이 지속적으로 전장을 쓸어버림", type: "berserk", parentId: 32 },

                { id: 40, name: "🌱 [시전] 냉기 응축", lv: 0, maxLv: 5, mp: 4, desc: "타겟 적의 위치에 얼음 기둥을 소환해 이속을 봉쇄", type: "active_ice", parentId: null },
                { id: 41, name: "🌿 [시전] 서리 파편", lv: 0, maxLv: 5, mp: 7, desc: "부딪치면 산산조각 나는 날카로운 고드름 투사체 4방 발사", type: "active_shard", parentId: 40 },
                { id: 42, name: "🌳 [시전] 영도 제어", lv: 0, maxLv: 5, mp: 11, desc: "자신 주변 일정 반경 내 모든 몹을 즉시 빙결 정지 유도", type: "active_freeze", parentId: 41 },
                { id: 3,  name: "❄️ [최상급] 절대영도: 심연", lv: 0, maxLv: 5, mp: 15, desc: "전체 화면 결빙 후 산산조각 내는 하이엔드 얼음 대폭발", type: "blizzard", parentId: 42 }
            ],
            equippedSkillIds: [] 
        };

        let camera = { x: 0, y: 0 }; let monsters = []; let droppedGolds = []; let damageNumbers = []; let projectiles = []; let particles = [];   
        let keys = {}; let joystickInput = { x: 0, y: 0 }; let joystickActive = false; let gameTick = 0; let lastAutoAttack = 0;
        let waveTimer = 0; let waveMode = 0; // 0:안정, 1:폭주, 2:광폭화, 3:카오스

        // 💾 [저장/불러오기 데이터 가공 장치]
        function saveData() {
            const saveObj = {
                level: player.level, exp: player.exp, maxExp: player.maxExp, sp: player.sp, gold: player.gold,
                baseAtk: player.baseAtk, maxHp: player.maxHp, maxMp: player.maxMp, stats: player.stats,
                skills: player.skills.map(s => ({ id: s.id, lv: s.lv })),
                equippedSkillIds: player.equippedSkillIds,
                arrowLevel: player.arrowLevel, overloadLevel: player.overloadLevel, chainLightningLevel: player.chainLightningLevel,
                giantSizeLevel: player.giantSizeLevel, thornLevel: player.thornLevel, shuriken: player.shuriken, shield: player.shield
            };
            localStorage.setItem("HnS_Infinite_Save", JSON.stringify(saveObj));
            const ind = document.getElementById("saveIndicator");
            ind.innerText = "💾 자동 저장 완료"; ind.style.color = "#10b981";
        }

        function loadData() {
            const raw = localStorage.getItem("HnS_Infinite_Save");
            if (!raw) return;
            try {
                const d = JSON.parse(raw);
                player.level = d.level || 1; player.exp = d.exp || 0; player.maxExp = d.maxExp || 12;
                player.sp = d.sp !== undefined ? d.sp : 0; player.gold = d.gold || 0;
                player.baseAtk = d.baseAtk || 10; player.maxHp = d.maxHp || 60; player.maxMp = d.maxMp || 40;
                if (d.stats) player.stats = d.stats;
                if (d.skills) {
                    d.skills.forEach(savedSkill => {
                        let target = player.skills.find(s => s.id === savedSkill.id);
                        if (target) target.lv = savedSkill.lv;
                    });
                }
                player.equippedSkillIds = d.equippedSkillIds || [];
                player.arrowLevel = d.arrowLevel || 0; player.overloadLevel = d.overloadLevel || 0;
                player.chainLightningLevel = d.chainLightningLevel || 0; player.giantSizeLevel = d.giantSizeLevel || 0;
                player.thornLevel = d.thornLevel || 0;
                if (d.shuriken) player.shuriken = d.shuriken; if (d.shield) player.shield = d.shield;
                player.hp = player.maxHp + player.stats.hpBonus;
            } catch(e) { console.error("세이브 로드 오류, 리셋 실행", e); }
        }

        function resetData() {
            if (confirm("정말로 모든 성장을 초기화하고 재시작하시겠습니까?")) {
                localStorage.removeItem("HnS_Infinite_Save"); window.location.reload();
            }
        }

        const zone = document.getElementById("joystickZone"); const stick = document.getElementById("joystickStick");
        function handleJoystick(ex, ey) {
            const rect = zone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2; const centerY = rect.top + rect.height / 2;
            let dx = ex - centerX; let dy = ey - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy); const maxDist = 30;
            if (dist > maxDist) { dx = (dx / dist) * maxDist; dy = (dy / dist) * maxDist; }
            stick.style.transform = `translate(${dx}px, ${dy}px)`;
            joystickInput.x = dx / maxDist; joystickInput.y = dy / maxDist;
        }

        zone.addEventListener("touchstart", (e) => { joystickActive = true; handleJoystick(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener("touchmove", (e) => { if(joystickActive) handleJoystick(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
        window.addEventListener("touchend", () => { joystickActive = false; stick.style.transform = "translate(0px, 0px)"; joystickInput = {x:0, y:0}; });
        zone.addEventListener("mousedown", (e) => { joystickActive = true; handleJoystick(e.clientX, e.clientY); });
        window.addEventListener("mousemove", (e) => { if(joystickActive) handleJoystick(e.clientX, e.clientY); });
        window.addEventListener("mouseup", () => { joystickActive = false; stick.style.transform = "translate(0px, 0px)"; joystickInput = {x:0, y:0}; });

        function closeModals() {
            document.getElementById("levelModal").style.display = "none";
            document.getElementById("treeModal").style.display = "none";
            document.getElementById("shopModal").style.display = "none";
        }
        function openShopModal() { closeModals(); document.getElementById("shopModal").style.display = "flex"; }
        function openTreeModal() { closeModals(); renderTreeSkills(); document.getElementById("treeModal").style.display = "flex"; }

        function isSkillUnlocked(sk) {
            if (sk.parentId === null) return true;
            let parent = player.skills.find(s => s.id === sk.parentId);
            return parent && parent.lv > 0;
        }

        function renderTreeSkills() {
            const container = document.getElementById("treeSkillContainer"); container.innerHTML = "";
            player.skills.forEach(sk => {
                let unlocked = isSkillUnlocked(sk); let isEquipped = player.equippedSkillIds.includes(sk.id);
                let div = document.createElement("div"); div.className = `choice-btn skill-node ${unlocked ? "" : "node-locked"}`;
                div.style.flexDirection = "column"; div.style.alignItems = "flex-start";
                div.innerHTML = `
                    <div style="display:flex; width:100%; justify-content:space-between; font-weight:bold;">
                        <span>${sk.name} (Lv.${sk.lv}/${sk.maxLv})</span>
                        <span style="color:#60a5fa;">MP ${sk.mp}</span>
                    </div>
                    <div style="font-size:10px; color:#a1a1aa; margin:2px 0;">${sk.desc}</div>
                    <div style="display:flex; gap:6px; margin-top:4px; width:100%;">
                        <button onclick="upgradeSkill(${sk.id}, event)" ${unlocked ? "" : "disabled"} style="font-size:9px; background:${unlocked ? '#3b82f6' : '#444'}; border:none; color:white; padding:3px 6px; border-radius:3px;">연구 강화 (1 SP)</button>
                        <button onclick="toggleEquipSkill(${sk.id}, event)" ${unlocked && sk.lv > 0 ? "" : "disabled"} style="font-size:9px; background:#111; border:1px solid #444; color:white; padding:3px 6px; border-radius:3px;">
                            ${isEquipped ? "❌ 슬롯 제거" : "➕ 액티브 등록"}
                        </button>
                        ${isEquipped ? '<span class="equip-indicator">장착됨</span>' : ''}
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function upgradeSkill(id, e) {
            e.stopPropagation(); let sk = player.skills.find(s => s.id === id);
            if (!isSkillUnlocked(sk)) return;
            if (player.sp >= 1 && sk.lv < sk.maxLv) { player.sp--; sk.lv++; renderTreeSkills(); updateUI(); saveData(); }
        }

        function toggleEquipSkill(id, e) {
            e.stopPropagation(); let sk = player.skills.find(s => s.id === id);
            if (sk.lv === 0 || !isSkillUnlocked(sk)) return;
            let idx = player.equippedSkillIds.indexOf(id);
            if (idx > -1) { player.equippedSkillIds.splice(idx, 1); } 
            else {
                if (player.equippedSkillIds.length >= 4) { alert("액티브 등록 슬롯은 최대 4개입니다."); return; }
                player.equippedSkillIds.push(id);
            }
            renderTreeSkills(); updateUI(); saveData();
        }

        function updateUI() {
            let totalMaxHp = player.maxHp + player.stats.hpBonus;
            // 📊 0/0 수치 가시성 극대화 보정
            document.getElementById("pUiHp").innerText = `${Math.ceil(player.hp)} / ${totalMaxHp}`;
            document.getElementById("pUiMp").innerText = `${Math.floor(player.mp)} / ${player.maxMp}`;
            document.getElementById("pLv").innerText = player.level;
            document.getElementById("pSp").innerText = player.sp;
            document.getElementById("pGold").innerText = player.gold;

            document.getElementById("hpFill").style.width = `${Math.max(0, (player.hp / totalMaxHp) * 100)}%`;
            document.getElementById("mpFill").style.width = `${(player.mp / player.maxMp) * 100}%`;
            document.getElementById("expFill").style.width = `${(player.exp / player.maxExp) * 100}%`;

            const waveEl = document.getElementById("pWaveState");
            if (waveMode === 1) { waveEl.innerText = `🔥 폭주전장 (XP 2배!)`; waveEl.style.color = "#f43f5e"; }
            else if (waveMode === 2) { waveEl.innerText = `🩸 광폭화 (XP 4배!! 보스X2)`; waveEl.style.color = "#b91c1c"; }
            else if (waveMode === 3) { waveEl.innerText = `🌌 카오스 에덴 (XP 8배!!! 보스X3)`; waveEl.style.color = "#c084fc"; }
            else { waveEl.innerText = "안정 정역"; waveEl.style.color = "#10b981"; }

            for (let i = 0; i < 4; i++) {
                const btn = document.getElementById(`slotBtn${i}`);
                if (i < player.equippedSkillIds.length) {
                    let sk = player.skills.find(s => s.id === player.equippedSkillIds[i]);
                    btn.innerHTML = `${sk.name.split("] ")[1]}<br><span style="font-size:8px; color:#93c5fd;">MP ${sk.mp} (Lv.${sk.lv})</span>`;
                    btn.disabled = (player.mp < sk.mp || player.isTrance);
                } else { btn.innerHTML = "[비어있음]"; btn.disabled = true; }
            }
        }

        function buyShop(type) {
            if (type === 1 && player.gold >= 15) { player.gold -= 15; player.stats.atkBonus += 3; }
            else if (type === 2 && player.gold >= 20) { player.gold -= 20; player.stats.hpBonus += 15; player.hp += 15; }
            updateUI(); saveData();
        }

        function checkLevelUp() {
            if (player.exp >= player.maxExp) {
                player.exp -= player.maxExp; player.level++; player.sp += 3;
                player.maxExp = Math.floor(player.maxExp * 1.32) + 6;
                triggerLevelChoice(); saveData();
            }
        }

        function triggerLevelChoice() {
            const container = document.getElementById("levelChoices"); container.innerHTML = "";
            const pool = [
                { text: "🏹 유도 마법 화살 투사 개체 강화", action: () => { player.arrowLevel++; }},
                { text: "💥 불안정한 사망 지점 연쇄 과부하 폭발", action: () => { player.overloadLevel++; }},
                { text: "🌀 위성 궤도 가디언 표창 한계 수량 돌파", action: () => { player.shuriken.count++; player.shuriken.radius += 1; player.shuriken.orbitRadius += 8; player.shuriken.dmg += 2; }},
                { text: "🛡️ 전자기 전방위 충격파 배리어 실드 장착", action: () => { player.shield.active = true; player.shield.radius += 14; player.shield.dmg += 1; }},
                { text: "⚡ 전율의 일렉트릭 연쇄 번개 파장 전개", action: () => { player.chainLightningLevel++; }},
                { text: "🧬 거대화 타이탄 피지컬 육체화 (공격력 +5 가산)", action: () => { player.giantSizeLevel++; player.radius += 1.5; player.stats.atkBonus += 5; }},
                { text: "🩸 고정 스파이크 피의 가시 반사 갑옷 구축", action: () => { player.thornLevel++; }},
                { text: "✨ 공간 왜곡 필드 왜곡 (경험치 상시 보너스 +20%)", action: () => { player.stats.expBoostLevel++; }},
                { text: "🎯 아수라 아수라 심안 개안 (크리티컬 확률 7% 증가)", action: () => { player.stats.critChance += 0.07; }},
                { text: "🎭 영혼 메아리 수렴 (시전 스킬 10% 확률로 2중 사출)", action: () => { player.stats.doubleCast += 0.1; }}
            ];
            let shuffled = pool.sort(() => 0.5 - Math.random()).slice(0, 4);
            shuffled.forEach(choice => {
                let btn = document.createElement("button"); btn.className = "choice-btn"; btn.innerText = choice.text;
                btn.onclick = () => { choice.action(); closeModals(); updateUI(); saveData(); }; container.appendChild(btn);
            });
            document.getElementById("levelModal").style.display = "flex";
        }

        function useSlotSkill(slotIdx) {
            if (slotIdx >= player.equippedSkillIds.length) return;
            let id = player.equippedSkillIds[slotIdx]; let sk = player.skills.find(s => s.id === id);
            if (player.mp < sk.mp || player.isTrance) return;

            player.mp -= sk.mp;
            let castCount = Math.random() < player.stats.doubleCast ? 2 : 1;
            if (castCount === 2) {
                damageNumbers.push({ worldX: player.worldX, worldY: player.worldY - 32, text: "🎭 스킬 2중 분신 메아리!", color: "#c084fc", time: 30 });
            }
            for (let c = 0; c < castCount; c++) { executeCoreSkill(sk); }
            updateUI();
        }

        function executeCoreSkill(sk) {
            let baseAtk = player.baseAtk + player.stats.atkBonus;

            if (sk.type === "active_dash") {
                let mx = joystickInput.x !== 0 ? joystickInput.x : 1; let my = joystickInput.y !== 0 ? joystickInput.y : 0;
                player.worldX += (mx * 70); player.worldY += (my * 70);
                monsters.forEach(m => {
                    if (Math.sqrt((m.worldX - player.worldX)**2 + (m.worldY - player.worldY)**2) < 70) triggerDamage(m, baseAtk * 1.6, "#ffffff");
                });
                for(let i=0; i<10; i++) particles.push({ worldX: player.worldX, worldY: player.worldY, vx: (Math.random()-0.5)*6, vy: (Math.random()-0.5)*6, time: 12, color: "#f4f4f5" });
            }
            else if (sk.type === "active_slash") {
                if (monsters.length > 0) {
                    let m = monsters[Math.floor(Math.random()*monsters.length)]; triggerDamage(m, baseAtk * 1.9, "#f43f5e");
                }
            }
            else if (sk.type === "active_dance") {
                for(let i=0; i<14; i++) {
                    let ang = (Math.PI*2/14)*i;
                    particles.push({ worldX: player.worldX, worldY: player.worldY, vx: Math.cos(ang)*6, vy: Math.sin(ang)*6, time: 18, color: "#10b981" });
                }
                monsters.forEach(m => { if (Math.sqrt((m.worldX - player.worldX)**2 + (m.worldY - player.worldY)**2) < 100) triggerDamage(m, baseAtk * 1.3, "#34d399"); });
            }
            else if (sk.type === "active_zap") {
                if(monsters.length > 0) {
                    let m = monsters[0]; triggerDamage(m, baseAtk * 2.3, "#67e8f9");
                }
            }
            else if (sk.type === "active_spark") {
                for(let i=0; i<4; i++) {
                    let ang = (Math.PI/2)*i;
                    projectiles.push({ worldX: player.worldX, worldY: player.worldY, speed: 7, dmg: baseAtk * 1.4, target: monsters[Math.floor(Math.random()*monsters.length)] || {worldX: player.worldX+Math.cos(ang)*120, worldY:player.worldY+Math.sin(ang)*120, hp:9999} });
                }
            }
            else if (sk.type === "active_wave") {
                monsters.forEach(m => {
                    if (Math.sqrt((m.worldX - player.worldX)**2 + (m.worldY - player.worldY)**2) < 120) triggerDamage(m, baseAtk * 2.4, "#22d3ee");
                });
            }
            else if (sk.type === "active_blood") {
                if(monsters.length > 0) {
                    let m = monsters[Math.floor(Math.random()*monsters.length)];
                    triggerDamage(m, baseAtk * 1.5, "#ef4444"); player.hp = Math.min(player.maxHp + player.stats.hpBonus, player.hp + 4);
                }
            }
            else if (sk.type === "active_curse") {
                player.hp = Math.max(1, player.hp - 4);
                monsters.forEach(m => { if (Math.sqrt((m.worldX - player.worldX)**2 + (m.worldY - player.worldY)**2) < 110) triggerDamage(m, baseAtk * 2.7, "#991b1b"); });
            }
            else if (sk.type === "active_spike") {
                monsters.forEach(m => {
                    if (Math.sqrt((m.worldX - player.worldX)**2 + (m.worldY - player.worldY)**2) < 140) triggerDamage(m, baseAtk * 3.0, "#dc2626");
                });
            }
            else if (sk.type === "active_ice") {
                if(monsters.length > 0) { let m = monsters[0]; m.frozen = true; m.frozenTimer = 70; triggerDamage(m, baseAtk*1.6, "#3b82f6"); }
            }
            else if (sk.type === "active_shard") {
                monsters.forEach(m => {
                    if (Math.sqrt((m.worldX - player.worldX)**2 + (m.worldY - player.worldY)**2) < 130) triggerDamage(m, baseAtk*1.7, "#60a5fa");
                });
            }
            else if (sk.type === "active_freeze") {
                monsters.forEach(m => { if (Math.sqrt((m.worldX - player.worldX)**2 + (m.worldY - player.worldY)**2) < 150) { m.frozen = true; m.frozenTimer = 100; } });
            }
            
            // 🐛 버프식 안전 연산으로 전환하여 프리징 버그 타파
            else if (sk.type === "trance") { player.isTrance = true; player.tranceTimer = 260 + (sk.lv * 30); } 
            else if (sk.type === "zeus") { player.speedZeusTimer = 320 + (sk.lv * 60); } 
            else if (sk.type === "berserk") { player.berserkTimer = 380 + (sk.lv * 60); } 
            else if (sk.type === "blizzard") {
                player.blizzardTimer = 220 + (sk.lv * 40);
                monsters.forEach(m => {
                    let dmg = 30 + (sk.lv * 8); m.hp -= dmg; m.frozen = true; m.frozenTimer = player.blizzardTimer;
                    damageNumbers.push({ worldX: m.worldX, worldY: m.worldY - 10, text: `❄️ 심연박쇄 ${dmg}`, color: "#38bdf8", time: 35 });
                });
            }
        }

        function triggerDamage(target, dmg, color) {
            if (!target || target.hp <= 0) return;
            if (Math.random() < player.stats.critChance) { dmg *= 2; color = "#fbbf24"; }
            target.hp -= dmg; damageNumbers.push({ worldX: target.worldX, worldY: target.worldY - 14, text: `${Math.floor(dmg)}`, color: color, time: 22 });
            
            if (target.hp <= 0) {
                let rGold = Math.floor(Math.random() * 3) + 2; 
                if (target.name.includes("미믹")) rGold *= 7; if (waveMode === 3) rGold *= 4;
                droppedGolds.push({ worldX: target.worldX, worldY: target.worldY, value: rGold });
                
                // 📈 [경험치 획득량 대폭 버프 조정] 기본 3에서 -> 10으로 고정 상향
                let xpGain = target.isBoss ? 80 : 10;
                if (waveMode === 1) xpGain *= 2; 
                if (waveMode === 2) xpGain *= 4; 
                if (waveMode === 3) xpGain *= 8;
                if (player.stats.expBoostLevel > 0) xpGain *= (1 + player.stats.expBoostLevel * 0.2);

                player.exp += xpGain; 
                if (player.overloadLevel > 0) triggerExplosion(target.worldX, target.worldY);
                checkLevelUp();
            }
        }

        function triggerExplosion(wx, wy) {
            let expRadius = 60 + (player.overloadLevel * 12); let expDmg = 10 + (player.overloadLevel * 4);
            for(let i=0; i<10; i++) particles.push({ worldX: wx, worldY: wy, vx: (Math.random()-0.5)*7, vy: (Math.random()-0.5)*7, time: 16, color: "#ea580c" });
            monsters.forEach(m => { if (Math.sqrt((m.worldX - wx)**2 + (m.worldY - wy)**2) < expRadius) triggerDamage(m, expDmg, "#f97316"); });
        }

        function updateGame() {
            gameTick++; if (player.hp <= 0 || document.getElementById("levelModal").style.display === "flex") return;

            // 5초 간격 상시 자동 세이브 트리거
            if (gameTick % 300 === 0) { saveData(); }

            // 폭주 순환 주기 타이머
            if (gameTick % 1200 === 0) {
                let roll = Math.random();
                if (roll < 0.60) { waveMode = 1; waveTimer = 450; }
                else if (roll < 0.90 && player.level >= 5) { waveMode = 2; waveTimer = 400; }
                else if (player.level >= 10) { waveMode = 3; waveTimer = 350; }
                else { waveMode = 1; waveTimer = 450; }
            }
            if (waveTimer > 0) { waveTimer--; if (waveTimer <= 0) waveMode = 0; }

            if (gameTick % 45 === 0) {
                let maxHp = player.maxHp + player.stats.hpBonus;
                if (player.hp < maxHp) player.hp = Math.min(maxHp, player.hp + 2);
            }

            // 상시 오토 타겟팅 기본 평타 공격 메커니즘
            if (gameTick - lastAutoAttack >= 28 && monsters.length > 0) {
                lastAutoAttack = gameTick;
                let closestM = null; let minDist = 9999;
                monsters.forEach(m => {
                    let d = Math.sqrt((m.worldX - player.worldX)**2 + (m.worldY - player.worldY)**2);
                    if (d < minDist) { minDist = d; closestM = m; }
                });
                if (closestM && minDist < 260) {
                    projectiles.push({ worldX: player.worldX, worldY: player.worldY, speed: 7.5, dmg: (player.baseAtk + player.stats.atkBonus) * 0.8, target: closestM });
                }
            }

            let levelScale = 1.0 + (player.level - 1) * 0.15; let currentSpeed = player.speed;

            // 🐛 무아지경 프레임 단위 안전 분산 구현 (프리징 요인 영구 소멸)
            if (player.isTrance) {
                player.tranceTimer--; if (player.tranceTimer <= 0) player.isTrance = false;
                if (gameTick % 12 === 0 && monsters.length > 0) {
                    let target = monsters[Math.floor(Math.random() * monsters.length)];
                    player.worldX = target.worldX + (Math.random()-0.5)*15; player.worldY = target.worldY + (Math.random()-0.5)*15;
                    triggerDamage(target, (player.baseAtk + player.stats.atkBonus) * 1.8, "#fbbf24");
                }
            }

            if (player.speedZeusTimer > 0) {
                currentSpeed *= 1.8; player.speedZeusTimer--;
                if (gameTick % 5 === 0) {
                    monsters.forEach(m => {
                        if (Math.sqrt((m.worldX - player.worldX)**2 + (m.worldY - player.worldY)**2) < 165) triggerDamage(m, 6, "#67e8f9");
                    });
                }
            }

            if (player.berserkTimer > 0) {
                player.berserkTimer--;
                if (gameTick % 8 === 0) {
                    monsters.forEach(m => {
                        if (Math.sqrt((m.worldX - player.worldX)**2 + (m.worldY - player.worldY)**2) < 140) {
                            triggerDamage(m, 8, "#f43f5e"); player.hp = Math.min(player.maxHp + player.stats.hpBonus, player.hp + 1.2);
                        }
                    });
                }
            }

            let moveX = joystickInput.x; let moveY = joystickInput.y;
            if (keys["w"] || keys["arrowup"]) moveY = -1; if (keys["s"] || keys["arrowdown"]) moveY = 1;
            if (keys["a"] || keys["arrowleft"]) moveX = -1; if (keys["d"] || keys["arrowright"]) moveX = 1;

            if (!player.isTrance && (moveX !== 0 || moveY !== 0)) {
                let length = Math.sqrt(moveX*moveX + moveY*moveY);
                player.worldX += (moveX / length) * currentSpeed; player.worldY += (moveY / length) * currentSpeed;
            }
            player.mp = Math.min(player.maxMp, player.mp + player.stats.mpRegen);

            camera.x += (player.worldX - canvas.width / 2 - camera.x) * 0.1;
            camera.y += (player.worldY - canvas.height / 2 - camera.y) * 0.1;

            if (player.arrowLevel > 0) {
                player.magicArrowTimer++;
                if (player.magicArrowTimer >= Math.max(14, 55 - (player.arrowLevel * 5)) && monsters.length > 0) {
                    player.magicArrowTimer = 0; projectiles.push({ worldX: player.worldX, worldY: player.worldY, speed: 6, dmg: 7 + (player.arrowLevel * 3), target: monsters[Math.floor(Math.random()*monsters.length)] });
                }
            }

            if (player.chainLightningLevel > 0 && gameTick % 55 === 0 && monsters.length > 0) {
                let count = 0; let currentChainTarget = monsters[0];
                while(currentChainTarget && count < player.chainLightningLevel + 2) {
                    triggerDamage(currentChainTarget, 5 + player.chainLightningLevel * 2, "#a5f3fc"); count++;
                    currentChainTarget = monsters[Math.floor(Math.random() * monsters.length)];
                }
            }

            for(let i=projectiles.length-1; i>=0; i--) {
                let p = projectiles[i]; if (!monsters.includes(p.target) || p.target.hp <= 0) { projectiles.splice(i, 1); continue; }
                let dx = p.target.worldX - p.worldX; let dy = p.target.worldY - p.worldY; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 10) { triggerDamage(p.target, p.dmg, "#e9d5ff"); projectiles.splice(i, 1); } else { p.worldX += (dx / dist) * p.speed; p.worldY += (dy / dist) * p.speed; }
            }

            particles.forEach(p => { p.worldX += p.vx; p.worldY += p.vy; p.time--; }); particles = particles.filter(p => p.time > 0);

            if (player.shuriken.count > 0) {
                player.shuriken.angle += player.shuriken.speed;
                for (let i = 0; i < player.shuriken.count; i++) {
                    let finalAngle = player.shuriken.angle + (i * (Math.PI * 2 / player.shuriken.count));
                    let sx = player.worldX + Math.cos(finalAngle) * player.shuriken.orbitRadius; let sy = player.worldY + Math.sin(finalAngle) * player.shuriken.orbitRadius;
                    monsters.forEach(m => { if (Math.sqrt((m.worldX - sx)**2 + (m.worldY - sy)**2) < m.radius + player.shuriken.radius) { m.hp -= 0.15; if (Math.random() < 0.04) triggerDamage(m, player.shuriken.dmg, "#e4e4e7"); } });
                }
            }

            if (player.shield.active && player.shield.tickTimer++ % 20 === 0) {
                monsters.forEach(m => { if (Math.sqrt((m.worldX - player.worldX)**2 + (m.worldY - player.worldY)**2) < player.shield.radius) triggerDamage(m, player.shield.dmg, "#3b82f6"); });
            }

            for(let i=droppedGolds.length-1; i>=0; i--) {
                let g = droppedGolds[i]; let dx = player.worldX - g.worldX; let dy = player.worldY - g.worldY; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < player.stats.magnetRange) { g.worldX += (dx / dist) * 4; g.worldY += (dy / dist) * 4; if (dist < player.radius + 6) { player.gold += g.value; droppedGolds.splice(i, 1); } }
            }

            // 👾 몬스터 풀 대거 다양화 확장 엔진 파트
            let spawnRateMultiplier = waveMode === 1 ? 1.5 : (waveMode === 2 ? 2.0 : (waveMode === 3 ? 2.5 : 1.0));
            let maxSpawnCount = Math.floor(9 * spawnRateMultiplier);

            if (monsters.length < maxSpawnCount && gameTick % 24 === 0) {
                let angle = Math.random() * Math.PI * 2;
                let isBossSpawn = (gameTick % 800 === 0);
                let statMultiplier = waveMode === 1 ? 1.5 : (waveMode === 2 ? 2.0 : (waveMode === 3 ? 3.0 : 1.0));

                let finalColor = "#10b981"; 
                if (waveMode === 1) finalColor = "#f43f5e"; 
                else if (waveMode === 2) finalColor = "#991b1b"; 
                else if (waveMode === 3) finalColor = "#a855f7"; 

                if (isBossSpawn) {
                    let bossCount = waveMode === 2 ? 2 : (waveMode === 3 ? 3 : 1);
                    const bossPool = [
                        { name: "👑 고성능골렘", rad: 26, spd: 0.35, hp: 180 },
                        { name: "👑 지옥가고일", rad: 22, spd: 0.65, hp: 140 },
                        { name: "👑 카오스마왕", rad: 25, spd: 0.45, hp: 220 },
                        { name: "👑 데스나이트", rad: 24, spd: 0.55, hp: 190 }
                    ];
                    let bType = bossPool[Math.floor(Math.random() * bossPool.length)];
                    for (let b = 0; b < bossCount; b++) {
                        monsters.push({ worldX: player.worldX + Math.cos(angle + b)*310, worldY: player.worldY + Math.sin(angle + b)*310, name: bType.name, color: finalColor, hp: bType.hp * levelScale * statMultiplier, maxHp: bType.hp * levelScale * statMultiplier, atk: 14 * levelScale * statMultiplier, radius: bType.rad, speed: bType.spd, attackCooldown: 0, isBoss: true });
                    }
                } else {
                    let poolSeed = Math.random();
                    // 👾 몬스터군 다각화 배치
                    let mType = { name: "슬라임", radius: 10, speed: 0.5, hp: 16 };
                    if(poolSeed > 0.82) mType = { name: "오크전사", radius: 14, speed: 0.4, hp: 38 };
                    else if(poolSeed > 0.66) mType = { name: "고스트섀도", radius: 11, speed: 0.88, hp: 14 };
                    else if(poolSeed > 0.50) mType = { name: "미믹상자", radius: 12, speed: 0.3, hp: 22 };
                    else if(poolSeed > 0.33) mType = { name: "해골궁수", radius: 12, speed: 0.55, hp: 20 };
                    else if(poolSeed > 0.16) mType = { name: "빙결슬라임", radius: 13, speed: 0.45, hp: 28 };

                    monsters.push({ worldX: player.worldX + Math.cos(angle)*330, worldY: player.worldY + Math.sin(angle)*330, name: mType.name, color: finalColor, hp: mType.hp * levelScale * statMultiplier, maxHp: mType.hp * levelScale * statMultiplier, atk: 3 * levelScale * statMultiplier, radius: mType.radius, speed: mType.speed, attackCooldown: 0, isBoss: false });
                }
            }

            monsters.forEach(m => {
                if (m.frozen) { m.frozenTimer--; if(m.frozenTimer <= 0) m.frozen = false; return; }
                let dx = player.worldX - m.worldX; let dy = player.worldY - m.worldY; let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist > 5) { m.worldX += (dx / dist) * m.speed; m.worldY += (dy / dist) * m.speed; }

                if (dist < player.radius + m.radius && m.attackCooldown <= 0) {
                    player.hp = Math.max(0, player.hp - m.atk); m.attackCooldown = 45;
                    damageNumbers.push({ worldX: player.worldX, worldY: player.worldY - 12, text: `-${Math.ceil(m.atk)}`, color: "#ef4444", time: 20 });
                    if (player.thornLevel > 0) triggerDamage(m, player.thornLevel * 7, "#e4e4e7");
                }
                if (m.attackCooldown > 0) m.attackCooldown--;
            });

            monsters = monsters.filter(m => m.hp > 0); updateUI();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.save(); ctx.translate(-camera.x, -camera.y);

            if (waveMode === 1) ctx.strokeStyle = "#450a0a"; 
            else if (waveMode === 2) ctx.strokeStyle = "#7f1d1d";
            else if (waveMode === 3) ctx.strokeStyle = "#3b0764";
            else ctx.strokeStyle = "#13131a";
            
            ctx.lineWidth = 1;
            let startGridX = Math.floor(camera.x / 40) * 40 - 40; let startGridY = Math.floor(camera.y / 40) * 40 - 40;
            for (let x = startGridX; x < startGridX + canvas.width + 80; x += 40) { ctx.beginPath(); ctx.moveTo(x, startGridY); ctx.lineTo(x, startGridY + canvas.height + 80); ctx.stroke(); }
            for (let y = startGridY; y < startGridY + canvas.height + 80; y += 40) { ctx.beginPath(); ctx.moveTo(startGridX, y); ctx.lineTo(startGridX + canvas.width + 80, y); ctx.stroke(); }

            droppedGolds.forEach(g => { ctx.fillStyle = "#fbbf24"; ctx.beginPath(); ctx.arc(g.worldX, g.worldY, 4, 0, Math.PI * 2); ctx.fill(); });

            monsters.forEach(m => {
                ctx.fillStyle = m.frozen ? "#60a5fa" : m.color; ctx.beginPath(); ctx.arc(m.worldX, m.worldY, m.radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "#111115"; ctx.fillRect(m.worldX - 22, m.worldY - m.radius - 8, 44, 5);
                ctx.fillStyle = "#f43f5e"; ctx.fillRect(m.worldX - 22, m.worldY - m.radius - 8, 44 * (m.hp / m.maxHp), 5);
                ctx.fillStyle = "#ffffff"; ctx.font = "bold 7px sans-serif"; ctx.textAlign = "center";
                ctx.fillText(`${m.name} [${Math.ceil(m.hp)}]`, m.worldX, m.worldY - m.radius - 11);
            });

            projectiles.forEach(p => { ctx.fillStyle = "#c084fc"; ctx.beginPath(); ctx.arc(p.worldX, p.worldY, 3.5, 0, Math.PI * 2); ctx.fill(); });
            particles.forEach(p => { ctx.fillStyle = p.color || "#fb923c"; ctx.beginPath(); ctx.arc(p.worldX, p.worldY, 2.5, 0, Math.PI * 2); ctx.fill(); });

            if (player.shield.active) { ctx.strokeStyle = "rgba(59, 130, 246, 0.25)"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(player.worldX, player.worldY, player.shield.radius, 0, Math.PI * 2); ctx.stroke(); }

            if (player.isTrance) ctx.fillStyle = "#fbbf24";
            else if (player.berserkTimer > 0) ctx.fillStyle = "#991b1b";
            else if (player.speedZeusTimer > 0) ctx.fillStyle = "#06b6d4";
            else ctx.fillStyle = "#10b981";
            ctx.beginPath(); ctx.arc(player.worldX, player.worldY, player.radius, 0, Math.PI * 2); ctx.fill();

            if (player.shuriken.count > 0) {
                for (let i = 0; i < player.shuriken.count; i++) {
                    let finalAngle = player.shuriken.angle + (i * (Math.PI * 2 / player.shuriken.count));
                    ctx.fillStyle = "#f4f4f5"; ctx.beginPath(); ctx.arc(player.worldX + Math.cos(finalAngle)*player.shuriken.orbitRadius, player.worldY + Math.sin(finalAngle)*player.shuriken.orbitRadius, player.shuriken.radius, 0, Math.PI * 2); ctx.fill();
                }
            }

            ctx.textAlign = "left";
            for (let i = damageNumbers.length - 1; i >= 0; i--) {
                let d = damageNumbers[i]; ctx.fillStyle = d.color; ctx.font = "bold 11px monospace"; ctx.fillText(d.text, d.worldX - 5, d.worldY); d.worldY -= 0.6; d.time--; if (d.time <= 0) damageNumbers.splice(i, 1);
            }
            ctx.restore();
        }

        function gameLoop() { updateGame(); draw(); requestAnimationFrame(gameLoop); }
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        // 구동 준비 단계 로드
        loadData();
        gameLoop();
    </script>
</body>
</html>
