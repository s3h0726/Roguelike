<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>실시간 오픈월드 로그라이크 RPG - 무한 스크롤 버전</title>
    <style>
        :root {
            --bg-color: #0c0c0e;
            --panel-color: #16161a;
            --border-color: #27272a;
            --text-color: #f4f4f5;
            --hp-color: #ef4444;
            --mp-color: #3b82f6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 8px;
            overflow: hidden;
            user-select: none;
            box-sizing: border-box;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 480px;
        }

        h1 { font-size: 1rem; margin: 4px 0; color: #a1a1aa; text-transform: uppercase; }
        
        .status-panel {
            width: 100%;
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 10px;
            margin-bottom: 6px;
            box-sizing: border-box;
        }

        .bar-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .bar-container {
            position: relative; width: 48%; height: 14px;
            background-color: #1f1f23; border-radius: 4px; overflow: hidden; border: 1px solid #3f3f46;
        }
        .bar-fill { height: 100%; width: 100%; }
        .bar-text {
            position: absolute; width: 100%; text-align: center;
            font-size: 9px; font-weight: bold; line-height: 14px; color: #fff;
        }
        .info-row { display: flex; justify-content: space-between; font-size: 10px; color: #a1a1aa; }

        canvas {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #09090b;
            width: 100%;
            max-height: 32vh;
            height: auto;
        }

        .log-box {
            width: 100%; height: 42px; background-color: #09090b; border: 1px solid var(--border-color);
            border-radius: 6px; padding: 4px 6px; overflow-y: auto; font-size: 10px; color: #d4d4d8;
            margin-top: 4px; box-sizing: border-box;
        }

        /* 버프 스킬 세련된 그리드 배치 */
        .skills-wrapper { display: grid; grid-template-columns: 1fr 1fr; width: 100%; margin-top: 4px; gap: 4px; }
        .skill-btn {
            padding: 5px; font-size: 10px; font-weight: bold;
            background-color: #27272a; border: 1px solid #3f3f46; color: white; border-radius: 4px;
        }
        .skill-btn:disabled { opacity: 0.3; }

        .controls-wrapper {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; margin-top: 10px; padding-bottom: 10px; box-sizing: border-box;
        }

        .joystick-zone {
            width: 95px; height: 95px; background: #1f1f23; border: 2px solid #3f3f46;
            border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center;
        }
        .joystick-stick {
            width: 38px; height: 38px; background: #52525b; border-radius: 50%;
            position: absolute; box-shadow: 0 4px 6px rgba(0,0,0,0.4);
        }
        
        .ultimate-wrapper { display: flex; width: 40%; justify-content: center; }
        .action-btn-main {
            width: 72px; height: 72px; background: linear-gradient(145deg, #d97706, #b45309);
            border: 1px solid #f59e0b; color: #fff; font-size: 11px; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 50%; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .action-btn-main:disabled { background: #27272a; border-color: #3f3f46; color: #71717a; box-shadow: none; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Infinite Seamless World</h1>
        
        <div class="status-panel">
            <div class="bar-row">
                <div class="bar-container">
                    <div id="hpFill" class="bar-fill" style="background-color: var(--hp-color);"></div>
                    <div class="bar-text">HP <span id="pHp">50</span>/50</div>
                </div>
                <div class="bar-container">
                    <div id="mpFill" class="bar-fill" style="background-color: var(--mp-color);"></div>
                    <div class="bar-text">MP <span id="pMp">30</span>/30</div>
                </div>
            </div>
            <div class="info-row">
                <div>⚔️ ATK: <span id="pAtk">8</span> | 🚀 버프 활성화 중</div>
                <div>🔮 상태: <span id="pState" style="color: #10b981; font-weight:bold;">정상</span></div>
            </div>
        </div>

        <canvas id="gameCanvas" width="600" height="400"></canvas>
        
        <div class="skills-wrapper">
            <button id="btnSkill1" class="skill-btn" onclick="useSpeedZeus()">⚡ 신속의 신벌 (MP12)</button>
            <button id="btnSkill2" class="skill-btn" onclick="useBerserk()">🩸 신성한 광폭화 (MP14)</button>
        </div>
        
        <div id="gameLog" class="log-box">월드가 자연스럽게 스크롤됩니다. 끝없는 전장을 탐험하세요!</div>

        <div class="controls-wrapper">
            <div id="joystickZone" class="joystick-zone">
                <div id="joystickStick" class="joystick-stick"></div>
            </div>
            
            <div class="ultimate-wrapper">
                <button id="btnUltimate" class="action-btn-main" onclick="useTrance()">
                    <span>🔥</span>
                    <span>무아지경</span>
                    <span style="font-size: 8px; color: #fef08a;">MP 15</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 무한 가상 좌표 시스템
        let player = { 
            worldX: 300, worldY: 200, radius: 14,
            hp: 50, maxHp: 50, mp: 30, maxMp: 30, baseAtk: 8,
            speed: 3.5, 
            isTrance: false,
            speedZeusTimer: 0,
            berserkTimer: 0
        };

        // 카메라 객체 (플레이어를 부드럽게 추적)
        let camera = { x: 0, y: 0 };

        const MONSTER_TYPES = [
            { name: "슬라임", color: "#22c55e", hp: 15, atk: 2, radius: 12, speed: 1.0 },
            { name: "고블린 추격꾼", color: "#a855f7", hp: 18, atk: 4, radius: 10, speed: 1.8 },
            { name: "오크 전사", color: "#f97316", hp: 35, atk: 6, radius: 16, speed: 0.8 }
        ];

        let monsters = [];
        let damageNumbers = [];
        let keys = {};
        let joystickInput = { x: 0, y: 0 };

        // 조이스틱 드래그 핸들링
        const zone = document.getElementById("joystickZone");
        const stick = document.getElementById("joystickStick");
        let joystickActive = false;

        function handleJoystick(ex, ey) {
            const rect = zone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let dx = ex - centerX; let dy = ey - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy); const maxDist = 38;
            if (dist > maxDist) { dx = (dx / dist) * maxDist; dy = (dy / dist) * maxDist; }
            stick.style.transform = `translate(${dx}px, ${dy}px)`;
            joystickInput.x = dx / maxDist; joystickInput.y = dy / maxDist;
        }
        zone.addEventListener("touchstart", (e) => { joystickActive = true; handleJoystick(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener("touchmove", (e) => { if(joystickActive) handleJoystick(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
        window.addEventListener("touchend", () => { joystickActive = false; stick.style.transform = "translate(0px, 0px)"; joystickInput = {x:0, y:0}; });
        zone.addEventListener("mousedown", (e) => { joystickActive = true; handleJoystick(e.clientX, e.clientY); });
        window.addEventListener("mousemove", (e) => { if(joystickActive) handleJoystick(e.clientX, e.clientY); });
        window.addEventListener("mouseup", () => { joystickActive = false; stick.style.transform = "translate(0px, 0px)"; joystickInput = {x:0, y:0}; });

        function addLog(message) {
            const logBox = document.getElementById("gameLog");
            logBox.innerHTML += `<br>${message}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateUI() {
            document.getElementById("pHp").innerText = Math.ceil(player.hp);
            document.getElementById("pMp").innerText = Math.floor(player.mp);
            document.getElementById("hpFill").style.width = `${(player.hp / player.maxHp) * 100}%`;
            document.getElementById("mpFill").style.width = `${(player.mp / player.maxMp) * 100}%`;

            const stateEl = document.getElementById("pState");
            if (player.isTrance) { stateEl.innerText = "💥무아지경 난격!"; stateEl.style.color = "#f59e0b"; }
            else if (player.berserkTimer > 0) { stateEl.innerText = "🩸광폭화 상태"; stateEl.style.color = "#ef4444"; }
            else if (player.speedZeusTimer > 0) { stateEl.innerText = "⚡신속 구동"; stateEl.style.color = "#3b82f6"; }
            else { stateEl.innerText = "정상"; stateEl.style.color = "#10b981"; }

            document.getElementById("btnUltimate").disabled = (player.mp < 15 || player.isTrance);
            document.getElementById("btnSkill1").disabled = (player.mp < 12 || player.isTrance);
            document.getElementById("btnSkill2").disabled = (player.mp < 14 || player.isTrance);
        }

        // 월드 좌표 기반 주변 몬스터 유동적 생성
        function manageMonsterSpawns() {
            if (monsters.length < 5) {
                let type = MONSTER_TYPES[Math.floor(Math.random() * MONSTER_TYPES.length)];
                // 플레이어 주변 스크롤 바깥 영역에 생성
                let angle = Math.random() * Math.PI * 2;
                let spawnDist = Math.random() * 200 + 350; 
                monsters.push({
                    worldX: player.worldX + Math.cos(angle) * spawnDist,
                    worldY: player.worldY + Math.sin(angle) * spawnDist,
                    ...type, hp: type.hp, maxHp: type.hp, attackCooldown: 0
                });
            }
        }

        // 5초간 다중 타겟 폭풍 난격 무아지경
        function useTrance() {
            if (player.mp < 15 || player.isTrance || player.hp <= 0) return;
            player.mp -= 15; player.isTrance = true; updateUI();
            addLog("🔥 [무아지경] 돌입! 5초간 전장의 적들을 무차별 고속 습격합니다!");

            let duration = 5000; let startTime = Date.now();
            let tranceInterval = setInterval(() => {
                if (Date.now() - startTime >= duration || player.hp <= 0 || monsters.length === 0) {
                    clearInterval(tranceInterval); player.isTrance = false;
                    addLog("✨ 무아지경 연격 종료."); updateUI(); return;
                }
                let target = monsters[Math.floor(Math.random() * monsters.length)];
                player.worldX = target.worldX; player.worldY = target.worldY; // 가상좌표 동기화

                let currentAtk = player.berserkTimer > 0 ? player.baseAtk * 2.5 : player.baseAtk;
                let dmg = Math.floor(currentAtk * 1.5);
                target.hp -= dmg;
                damageNumbers.push({ worldX: target.worldX, worldY: target.worldY - 15, text: `💥 ${dmg}`, color: "#f59e0b", time: 35 });

                if(player.berserkTimer > 0) {
                    let heal = Math.floor(dmg * 0.3);
                    player.hp = Math.min(player.maxHp, player.hp + heal);
                }
                monsters = monsters.filter(m => m.hp > 0);
            }, 250);
        }

        // 초강력 버프 1: 신속의 신벌 발동
        function useSpeedZeus() {
            if (player.mp < 12 || player.isTrance) return;
            player.mp -= 12; player.speedZeusTimer = 360; // 6초 (60fps * 6)
            addLog("⚡ [신속의 신벌] 발동! 속도가 2배가 되며 궤적에 번개가 치기 시작합니다.");
            updateUI();
        }

        // 초강력 버프 2: 신성한 광폭화 발동
        function useBerserk() {
            if (player.mp < 14 || player.isTrance) return;
            player.mp -= 14; player.berserkTimer = 420; // 7초
            addLog("🩸 [신성한 광폭화] 돌입! 대미지가 2.5배 폭증하고 모든 타격에 흡혈 특성이 부여됩니다.");
            updateUI();
        }

        function updateGame() {
            if (player.hp <= 0) return;

            // 1. 버프 상태 체크 및 이동 속도 계산
            let currentSpeed = player.speed;
            if (player.speedZeusTimer > 0) {
                currentSpeed *= 2.0;
                player.speedZeusTimer--;
                
                // 신속 이동 중 일정 주기마다 주변 적들에게 전기 방전 유도
                if (player.speedZeusTimer % 25 === 0) {
                    monsters.forEach(m => {
                        let dist = Math.sqrt((m.worldX - player.worldX)**2 + (m.worldY - player.worldY)**2);
                        if (dist < 120) {
                            m.hp -= 4;
                            damageNumbers.push({ worldX: m.worldX, worldY: m.worldY - 10, text: "⚡ 4", color: "#3b82f6", time: 20 });
                        }
                    });
                }
            }
            if (player.berserkTimer > 0) player.berserkTimer--;

            // 2. 입력 벡터 가산 및 실시간 자유 월드 이동
            let moveX = joystickInput.x; let moveY = joystickInput.y;
            if (keys["w"] || keys["arrowup"]) moveY = -1;
            if (keys["s"] || keys["arrowdown"]) moveY = 1;
            if (keys["a"] || keys["arrowleft"]) moveX = -1;
            if (keys["d"] || keys["arrowright"]) moveX = 1;

            if (!player.isTrance && (moveX !== 0 || moveY !== 0)) {
                let length = Math.sqrt(moveX*moveX + moveY*moveY);
                player.worldX += (moveX / length) * currentSpeed;
                player.worldY += (moveY / length) * currentSpeed;
                if (player.mp < player.maxMp) player.mp += 0.025; 
            }

            // 3. 부드러운 카메라 선형 보간 (심리스 핵심)
            camera.x += (player.worldX - canvas.width / 2 - camera.x) * 0.1;
            camera.y += (player.worldY - canvas.height / 2 - camera.y) * 0.1;

            // 4. 리스폰 제어 및 몬스터 AI 역추적
            manageMonsterSpawns();
            monsters.forEach(m => {
                let dx = player.worldX - m.worldX;
                let dy = player.worldY - m.worldY;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist > 5 && !player.isTrance) {
                    m.worldX += (dx / dist) * m.speed;
                    m.worldY += (dy / dist) * m.speed;
                }

                // 월드 좌표 기반 실시간 공방전 교환
                if (dist < player.radius + m.radius) {
                    if (m.attackCooldown <= 0) {
                        player.hp = Math.max(0, player.hp - m.atk);
                        
                        let currentAtk = player.baseAtk;
                        if (player.berserkTimer > 0) currentAtk *= 2.5; // 광폭 버프 연산

                        m.hp -= currentAtk;
                        m.attackCooldown = 40;

                        damageNumbers.push({ worldX: player.worldX, worldY: player.worldY - 12, text: `-${m.atk}`, color: "#ef4444", time: 25 });
                        damageNumbers.push({ worldX: m.worldX, worldY: m.worldY - 12, text: `-${Math.floor(currentAtk)}`, color: player.berserkTimer > 0 ? "#ef4444" : "#ffffff", time: 25 });

                        // 흡혈 연산 처리
                        if (player.berserkTimer > 0) {
                            let heal = Math.floor(currentAtk * 0.3);
                            player.hp = Math.min(player.maxHp, player.hp + heal);
                        }
                    }
                }
                if (m.attackCooldown > 0) m.attackCooldown--;
            });

            monsters = monsters.filter(m => m.hp > 0 && Math.sqrt((m.worldX - player.worldX)**2 + (m.worldY - player.worldY)**2) < 700);
            updateUI();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            // 카메라 스크롤 변환 행렬 적용 (화면이 자연스럽게 이동하는 근원)
            ctx.translate(-camera.x, -camera.y);

            // 1. 격자 무한 루프 배경 드로잉
            ctx.strokeStyle = "#141417"; ctx.lineWidth = 1;
            let startGridX = Math.floor(camera.x / 40) * 40 - 40;
            let endGridX = startGridX + canvas.width + 80;
            let startGridY = Math.floor(camera.y / 40) * 40 - 40;
            let endGridY = startGridY + canvas.height + 80;

            for (let x = startGridX; x < endGridX; x += 40) {
                ctx.beginPath(); ctx.moveTo(x, startGridY); ctx.lineTo(x, endGridY); ctx.stroke();
            }
            for (let y = startGridY; y < endGridY; y += 40) {
                ctx.beginPath(); ctx.moveTo(startGridX, y); ctx.lineTo(endGridX, y); ctx.stroke();
            }

            // 2. 몬스터 배치 드로잉
            monsters.forEach(m => {
                ctx.fillStyle = m.color;
                ctx.beginPath(); ctx.arc(m.worldX, m.worldY, m.radius, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = "#27272a"; ctx.fillRect(m.worldX - 12, m.worldY - m.radius - 6, 24, 3);
                ctx.fillStyle = "#ef4444"; ctx.fillRect(m.worldX - 12, m.worldY - m.radius - 6, 24 * (m.hp / m.maxHp), 3);
            });

            // 3. 플레이어 월드 개체 드로잉 (버프 유무에 따른 네온 아우라 서클 처리)
            ctx.fillStyle = player.isTrance ? "#f59e0b" : "#10b981";
            ctx.beginPath(); ctx.arc(player.worldX, player.worldY, player.radius, 0, Math.PI * 2); ctx.fill();
            
            if (player.speedZeusTimer > 0) {
                ctx.strokeStyle = "rgba(59, 130, 246, 0.5)"; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(player.worldX, player.worldY, player.radius + 6, 0, Math.PI * 2); ctx.stroke();
            }
            if (player.berserkTimer > 0) {
                ctx.strokeStyle = "rgba(239, 68, 68, 0.6)"; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(player.worldX, player.worldY, player.radius + 4, 0, Math.PI * 2); ctx.stroke();
            }

            // 4. 텍스트 연출 드로잉
            for (let i = damageNumbers.length - 1; i >= 0; i--) {
                let d = damageNumbers[i]; ctx.fillStyle = d.color; ctx.font = "bold 12px sans-serif";
                ctx.fillText(d.text, d.worldX - 6, d.worldY); d.worldY -= 0.7; d.time--;
                if (d.time <= 0) damageNumbers.splice(i, 1);
            }

            ctx.restore();
        }

        function gameLoop() { updateGame(); draw(); requestAnimationFrame(gameLoop); }
        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        gameLoop();
    </script>
</body>
</html>
