<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>실시간 오픈월드 로그라이크 RPG</title>
    <style>
        :root {
            --bg-color: #0c0c0e;
            --panel-color: #16161a;
            --border-color: #27272a;
            --text-color: #f4f4f5;
            --hp-color: #ef4444;
            --mp-color: #3b82f6;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: system-ui, -apple-system, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 8px;
            overflow: hidden;
            user-select: none;
            box-sizing: border-box;
        }

        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 480px;
        }

        h1 { font-size: 1rem; margin: 4px 0; color: #a1a1aa; text-transform: uppercase; }
        
        .status-panel {
            width: 100%;
            background-color: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 6px 10px;
            margin-bottom: 6px;
            box-sizing: border-box;
        }

        .bar-row { display: flex; justify-content: space-between; margin-bottom: 2px; }
        .bar-container {
            position: relative; width: 48%; height: 14px;
            background-color: #1f1f23; border-radius: 4px; overflow: hidden; border: 1px solid #3f3f46;
        }
        .bar-fill { height: 100%; width: 100%; }
        .bar-text {
            position: absolute; width: 100%; text-align: center;
            font-size: 9px; font-weight: bold; line-height: 14px; color: #fff;
        }
        .info-row { display: flex; justify-content: space-between; font-size: 10px; color: #a1a1aa; }

        canvas {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background-color: #09090b;
            width: 100%;
            max-height: 32vh;
            height: auto;
        }

        .log-box {
            width: 100%; height: 42px; background-color: #09090b; border: 1px solid var(--border-color);
            border-radius: 6px; padding: 4px 6px; overflow-y: auto; font-size: 10px; color: #d4d4d8;
            margin-top: 4px; box-sizing: border-box;
        }

        .skills-wrapper { display: flex; width: 100%; margin-top: 4px; gap: 4px; }
        .skill-btn {
            flex: 1; padding: 5px; font-size: 10px; font-weight: bold;
            background-color: #27272a; border: 1px solid #3f3f46; color: white; border-radius: 4px;
        }
        .skill-btn:disabled { opacity: 0.3; }

        /* 조이스틱 및 패드 레이아웃 */
        .controls-wrapper {
            display: flex; justify-content: space-between; align-items: center;
            width: 100%; margin-top: 10px; padding-bottom: 10px; box-sizing: border-box;
        }

        /* 가상 조이스틱 영역 */
        .joystick-zone {
            width: 100px; height: 100px; background: #1f1f23; border: 2px solid #3f3f46;
            border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center;
        }
        .joystick-stick {
            width: 40px; height: 40px; background: #52525b; border-radius: 50%;
            position: absolute; box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            transition: transform 0.05s linear;
        }
        
        .ultimate-wrapper { display: flex; width: 40%; justify-content: center; }
        .action-btn-main {
            width: 72px; height: 72px; background: linear-gradient(145deg, #d97706, #b45309);
            border: 1px solid #f59e0b; color: #fff; font-size: 11px; font-weight: bold;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 50%; box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        .action-btn-main:disabled { background: #27272a; border-color: #3f3f46; color: #71717a; box-shadow: none; }
    </style>
</head>
<body>

    <div class="game-container">
        <h1>Annihilation Realtime</h1>
        
        <div class="status-panel">
            <div class="bar-row">
                <div class="bar-container">
                    <div id="hpFill" class="bar-fill" style="background-color: var(--hp-color);"></div>
                    <div class="bar-text">HP <span id="pHp">50</span>/50</div>
                </div>
                <div class="bar-container">
                    <div id="mpFill" class="bar-fill" style="background-color: var(--mp-color);"></div>
                    <div class="bar-text">MP <span id="pMp">30</span>/30</div>
                </div>
            </div>
            <div class="info-row">
                <div>⚔️ ATK: <span id="pAtk">8</span> | 🛡️ 장막: <span id="pShield">0</span>s</div>
                <div>🔮 상태: <span id="pState" style="color: #10b981; font-weight:bold;">정상</span></div>
            </div>
        </div>

        <canvas id="gameCanvas" width="600" height="400"></canvas>
        
        <div class="skills-wrapper">
            <button id="btnSkill1" class="skill-btn" onclick="useLightning()">⚡ 장막 (MP10)</button>
            <button id="btnSkill2" class="skill-btn" onclick="useVampire()">🩸 흡혈 (MP12)</button>
        </div>
        
        <div id="gameLog" class="log-box">조이스틱 드래그 또는 WASD/방향키로 실시간 자유 이동이 가능합니다!</div>

        <div class="controls-wrapper">
            <div id="joystickZone" class="joystick-zone">
                <div id="joystickStick" class="joystick-stick"></div>
            </div>
            
            <div class="ultimate-wrapper">
                <button id="btnUltimate" class="action-btn-main" onclick="useTrance()">
                    <span>🔥</span>
                    <span>무아지경</span>
                    <span style="font-size: 8px; color: #fef08a;">MP 15</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // 실시간 픽셀 기반 좌표 시스템
        let player = { 
            x: 300, y: 200, radius: 14,
            hp: 50, maxHp: 50, mp: 30, maxMp: 30, baseAtk: 8,
            speed: 3.5, lightningTime: 0, isTrance: false
        };

        const MONSTER_TYPES = [
            { name: "슬라임", color: "#22c55e", hp: 15, atk: 2, radius: 12, speed: 1.0 },
            { name: "고블린 추격꾼", color: "#a855f7", hp: 18, atk: 4, radius: 10, speed: 1.8 },
            { name: "오크 전사", color: "#f97316", hp: 35, atk: 6, radius: 16, speed: 0.8 }
        ];

        let chunkX = 0, chunkY = 0;
        let monsters = [];
        let damageNumbers = [];
        let keys = {};
        let joystickInput = { x: 0, y: 0 };

        // 가상 조이스틱 로직
        const zone = document.getElementById("joystickZone");
        const stick = document.getElementById("joystickStick");
        let joystickActive = false;

        function handleJoystick(ex, ey) {
            const rect = zone.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            let dx = ex - centerX;
            let dy = ey - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = 40;

            if (dist > maxDist) {
                dx = (dx / dist) * maxDist;
                dy = (dy / dist) * maxDist;
            }

            stick.style.transform = `translate(${dx}px, ${dy}px)`;
            joystickInput.x = dx / maxDist;
            joystickInput.y = dy / maxDist;
        }

        zone.addEventListener("touchstart", (e) => { joystickActive = true; handleJoystick(e.touches[0].clientX, e.touches[0].clientY); });
        window.addEventListener("touchmove", (e) => { if(joystickActive) handleJoystick(e.touches[0].clientX, e.touches[0].clientY); }, {passive:false});
        window.addEventListener("touchend", () => { joystickActive = false; stick.style.transform = "translate(0px, 0px)"; joystickInput = {x:0, y:0}; });

        zone.addEventListener("mousedown", (e) => { joystickActive = true; handleJoystick(e.clientX, e.clientY); });
        window.addEventListener("mousemove", (e) => { if(joystickActive) handleJoystick(e.clientX, e.clientY); });
        window.addEventListener("mouseup", () => { joystickActive = false; stick.style.transform = "translate(0px, 0px)"; joystickInput = {x:0, y:0}; });

        function addLog(message) {
            const logBox = document.getElementById("gameLog");
            logBox.innerHTML += `<br>${message}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        function updateUI() {
            document.getElementById("pHp").innerText = Math.ceil(player.hp);
            document.getElementById("pMp").innerText = Math.floor(player.mp);
            document.getElementById("pShield").innerText = Math.ceil(player.lightningTime / 60);
            document.getElementById("hpFill").style.width = `${(player.hp / player.maxHp) * 100}%`;
            document.getElementById("mpFill").style.width = `${(player.mp / player.maxMp) * 100}%`;

            const stateEl = document.getElementById("pState");
            if (player.isTrance) { stateEl.innerText = "💥무아지경 난무 중!"; stateEl.style.color = "#f59e0b"; }
            else { stateEl.innerText = "정상"; stateEl.style.color = "#10b981"; }

            document.getElementById("btnUltimate").disabled = (player.mp < 15 || player.isTrance);
            document.getElementById("btnSkill1").disabled = (player.mp < 10 || player.isTrance);
            document.getElementById("btnSkill2").disabled = (player.mp < 12 || player.isTrance);
        }

        function spawnMonsters() {
            monsters = [];
            const count = Math.floor(Math.random() * 3) + 3;
            for(let i=0; i<count; i++) {
                let type = MONSTER_TYPES[Math.floor(Math.random() * MONSTER_TYPES.length)];
                monsters.push({
                    x: Math.random() * (canvas.width - 60) + 30,
                    y: Math.random() * (canvas.height - 60) + 30,
                    ...type, hp: type.hp, maxHp: type.hp, attackCooldown: 0
                });
            }
        }

        function useTrance() {
            if (player.mp < 15 || player.isTrance || player.hp <= 0) return;
            player.mp -= 15;
            player.isTrance = true;
            updateUI();
            addLog("🔥 [무아지경] 돌입! 5초간 전장의 적들을 무차별 고속 습격합니다!");

            let duration = 5000;
            let startTime = Date.now();

            let tranceInterval = setInterval(() => {
                if (Date.now() - startTime >= duration || player.hp <= 0 || monsters.length === 0) {
                    clearInterval(tranceInterval);
                    player.isTrance = false;
                    addLog("✨ 무아지경 난격이 종료되었습니다.");
                    updateUI();
                    return;
                }

                // 가장 가까운 타겟팅 선정 후 즉시 돌진 체인
                let target = monsters[Math.floor(Math.random() * monsters.length)];
                player.x = target.x;
                player.y = target.y;

                let dmg = Math.floor(player.baseAtk * 1.5);
                target.hp -= dmg;
                damageNumbers.push({ x: target.x, y: target.y - 10, text: `💥 ${dmg}`, color: "#f59e0b", time: 30 });

                if (target.hp <= 0) {
                    monsters = monsters.filter(m => m !== target);
                }
            }, 250); // 0.25초 마다 무작위 적의 위치로 계속 텔레포트 돌진 연타
        }

        function useLightning() {
            if (player.mp < 10 || player.isTrance) return;
            player.mp -= 10; player.lightningTime = 300; addLog("⚡ 정전기 장막 활성화!"); updateUI();
        }

        function useVampire() {
            if (player.mp < 12 || player.isTrance || monsters.length === 0) return;
            player.mp -= 12;
            let target = monsters[0];
            target.hp -= player.baseAtk;
            let heal = Math.floor(player.baseAtk * 0.5);
            player.hp = Math.min(player.maxHp, player.hp + heal);
            damageNumbers.push({ x: target.x, y: target.y - 10, text: `🩸 ${player.baseAtk}`, color: "#ec4899", time: 30 });
            if (target.hp <= 0) monsters.shift();
            updateUI();
        }

        // 실시간 물리 업데이트 및 무한 월드 체크 루프
        function updateGame() {
            if (player.hp <= 0) return;

            // 1. 키보드 + 조이스틱 통합 이동 벡터 가산
            let moveX = joystickInput.x;
            let moveY = joystickInput.y;

            if (keys["w"] || keys["arrowup"]) moveY = -1;
            if (keys["s"] || keys["arrowdown"]) moveY = 1;
            if (keys["a"] || keys["arrowleft"]) moveX = -1;
            if (keys["d"] || keys["arrowright"]) moveX = 1;

            if (!player.isTrance && (moveX !== 0 || moveY !== 0)) {
                let length = Math.sqrt(moveX*moveX + moveY*moveY);
                player.x += (moveX / length) * player.speed;
                player.y += (moveY / length) * player.speed;
                if (player.mp < player.maxMp) player.mp += 0.02; // 이동 시 마나 점진 회복
            }

            // 2. 무한 월드 스크롤 (화면 밖 전이 시 다음 맵으로 전환 + 적 연동 이동 보정)
            let chunkChanged = false;
            if (player.x < 0) { player.x = canvas.width; chunkX--; chunkChanged = true; }
            if (player.x > canvas.width) { player.x = 0; chunkX++; chunkChanged = true; }
            if (player.y < 0) { player.y = canvas.height; chunkY--; chunkChanged = true; }
            if (player.y > canvas.height) { player.y = 0; chunkY++; chunkChanged = true; }

            if (chunkChanged) {
                addLog(`🔮 새로운 구역 진입 (${chunkX}, ${chunkY})`);
                // 이전 맵 생존 적이 있으면 데려오고 없으면 새 배치
                if (monsters.length === 0) spawnMonsters();
                else {
                    monsters.forEach(m => {
                        m.x = Math.random() * (canvas.width - 100) + 50;
                        m.y = Math.random() * (canvas.height - 100) + 50;
                    });
                }
            }

            // 3. 정전기 장막 기믹 연산
            if (player.lightningTime > 0) {
                player.lightningTime--;
                if (player.lightningTime % 20 === 0) {
                    monsters.forEach(m => {
                        let dist = Math.sqrt((m.x - player.x)**2 + (m.y - player.y)**2);
                        if (dist < 80) {
                            m.hp -= 2;
                            damageNumbers.push({ x: m.x, y: m.y - 10, text: "⚡ 2", color: "#3b82f6", time: 15 });
                        }
                    });
                    monsters = monsters.filter(m => m.hp > 0);
                }
            }

            // 4. 실시간 적 AI 추적 및 충돌 전투 연산
            monsters.forEach(m => {
                let dx = player.x - m.x;
                let dy = player.y - m.y;
                let dist = Math.sqrt(dx*dx + dy*dy);

                if (dist > 5 && !player.isTrance) {
                    m.x += (dx / dist) * m.speed;
                    m.y += (dy / dist) * m.speed;
                }

                // 실시간 물리 바디 충돌 시 자동 전투 공방 교환
                if (dist < player.radius + m.radius) {
                    if (m.attackCooldown <= 0) {
                        player.hp = Math.max(0, player.hp - m.atk);
                        m.hp -= player.baseAtk;
                        m.attackCooldown = 45; // 프레임 단위 내부 무적/쿨타임

                        damageNumbers.push({ x: player.x, y: player.y - 12, text: `-${m.atk}`, color: "#ef4444", time: 25 });
                        damageNumbers.push({ x: m.x, y: m.y - 12, text: `-${player.baseAtk}`, color: "#ffffff", time: 25 });
                    }
                }
                if (m.attackCooldown > 0) m.attackCooldown--;
            });

            monsters = monsters.filter(m => m.hp > 0);
            updateUI();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 네온 액션 격자판 바닥 드로잉
            ctx.strokeStyle = "#141417";
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 30) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
            }

            // 2. 적군 렌더링
            monsters.forEach(m => {
                ctx.fillStyle = m.color;
                ctx.beginPath(); ctx.arc(m.x, m.y, m.radius, 0, Math.PI * 2); ctx.fill();
                
                // 체력 미니 바
                ctx.fillStyle = "#27272a"; ctx.fillRect(m.x - 12, m.y - m.radius - 6, 24, 3);
                ctx.fillStyle = "#ef4444"; ctx.fillRect(m.x - 12, m.y - m.radius - 6, 24 * (m.hp / m.maxHp), 3);
            });

            // 3. 플레이어 렌더링 (장막 발동 시 외곽 네온 서클 추가)
            ctx.fillStyle = player.isTrance ? "#f59e0b" : "#10b981";
            ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2); ctx.fill();
            
            if (player.lightningTime > 0) {
                ctx.strokeStyle = "rgba(59, 130, 246, 0.4)";
                ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(player.x, player.y, 50, 0, Math.PI * 2); ctx.stroke();
            }

            // 4. 데미지 수치 드로잉
            for (let i = damageNumbers.length - 1; i >= 0; i--) {
                let d = damageNumbers[i];
                ctx.fillStyle = d.color;
                ctx.font = "bold 12px sans-serif";
                ctx.fillText(d.text, d.x - 5, d.y);
                d.y -= 0.8; d.time--;
                if (d.time <= 0) damageNumbers.splice(i, 1);
            }
        }

        function gameLoop() {
            updateGame();
            draw();
            requestAnimationFrame(gameLoop);
        }

        window.addEventListener("keydown", (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        spawnMonsters();
        gameLoop();
    </script>
</body>
</html>
